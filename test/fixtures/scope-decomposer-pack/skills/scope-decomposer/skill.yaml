# scope-decomposer — makes the `task-spec-author` discipline the only
# well-formed path to authoring scope (new tasks / tracks / specs).
#
# Closes the recurring scope-authoring meta-drift (session handoff 2026-05-26):
# the agent writes scope as inline summary prose with no pre-research and no
# 11-field structure. Two rules:
#
#   scope-intent-nudge (SD.2)  — SOFT. On a prompt_submit whose text shows
#       scope-authoring intent, emit `warn` directing the agent to run
#       pre-research → invoke the `task-spec-author` skill → verify 11 fields.
#   inline-spec-block  (SD.3)  — HARD. On a Write/Edit of a task/track spec
#       into TASKS.md or docs/tasks/ with NO companion pre-research artifact
#       on disk, emit `block`.
#
# Architecture lock (project_opensquid_no_agent_loop): opensquid is a PASSIVE
# evaluator with no ability to invoke a Claude Code skill or run an agent
# loop. This skill is a GATE + DIRECTIVE emitter, NOT an orchestrator — it
# emits verdicts; the AGENT runs the orchestration by complying. Same shape
# as the workflow / git / d9-guard skills.
name: scope-decomposer
load: preload
when_to_load:
  - kind: event_type
    type: prompt_submit
  - tool_match: Write
  - tool_match: Edit
rules:
  - id: scope-intent-nudge
    process:
      - call: text_pattern_match
        args:
          text_field: prompt
          patterns:
            - '\bspec(?:c?ing|ced)?\s+(?:out|this|the)\b'
            - '\bscope\s+(?:out|this|the|a)\b'
            - '\bnew\s+(?:task|track)\b'
            - '\badd\s+(?:a\s+|another\s+)?(?:task|track)\b'
            - '\bdesign\s+(?:a|the|this)\b'
            - '\bplan\s+(?:out|a|the)\b'
        as: intent
      - call: verdict
        if: 'len(intent.matched) > 0'
        args:
          level: warn
          message: >-
            Scope-authoring intent detected. Before writing ANY task / track /
            spec: (1) run pre-research → docs/research/<slug>-pre-research-<date>.md;
            (2) invoke the `task-spec-author` skill with (intent + pre-research);
            (3) verify all 11 fields. Do NOT inline-spec in TASKS.md or
            docs/tasks/. opensquid emits this directive; YOU run the steps.

  # SD.3 — HARD gate. The DEST guard below ((Write|Edit) targeting TASKS.md or
  # docs/tasks/) is repeated as the leading `&&` terms of the verdict `if:` so
  # `&&` short-circuit protects the later steps' bindings (research / shape*)
  # from being read when DEST is false — they stay unset for non-spec writes
  # and the verdict never fires (matches the workflow skill's
  # `committing && phases != "complete"` short-circuit pattern).
  - id: inline-spec-block
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      # Disk truth: does a companion pre-research artifact already exist?
      # Guarded so the readdir only runs for spec destinations.
      - call: path_exists
        if: '(tool == "Write" || tool == "Edit") && (endsWith(targs.file_path, "TASKS.md") || contains(targs.file_path, "docs/tasks/"))'
        args:
          dir: docs/research
          pattern: '*-pre-research-*.md'
          # Anchor to the spec FILE's repo root, not the event cwd (cross-repo fix).
          base_file: args.file_path
        as: research
      # Content shape — Write body is args.content, Edit body is args.new_string.
      - call: text_pattern_match
        if: '(tool == "Write" || tool == "Edit") && (endsWith(targs.file_path, "TASKS.md") || contains(targs.file_path, "docs/tasks/"))'
        args:
          text_field: args.content
          patterns:
            - '###\s+(?:Task\s+[A-Z0-9.]+|#\d+)'
            - '\*\*(?:Deliverable|Required skills|Acceptance criteria|7-phase)\b'
        as: shapeWrite
      - call: text_pattern_match
        if: '(tool == "Write" || tool == "Edit") && (endsWith(targs.file_path, "TASKS.md") || contains(targs.file_path, "docs/tasks/"))'
        args:
          text_field: args.new_string
          patterns:
            - '###\s+(?:Task\s+[A-Z0-9.]+|#\d+)'
            - '\*\*(?:Deliverable|Required skills|Acceptance criteria|7-phase)\b'
        as: shapeEdit
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && (endsWith(targs.file_path, "TASKS.md") || contains(targs.file_path, "docs/tasks/")) && (len(shapeWrite.matched) > 0 || len(shapeEdit.matched) > 0) && research.exists == false'
        args:
          level: block
          message: >-
            BLOCKED: writing a task/track spec with NO pre-research artifact on
            disk. Author docs/research/<slug>-pre-research-<date>.md FIRST, then
            invoke the `task-spec-author` skill to produce the 11-field spec.
            Inline-spec in TASKS.md / docs/tasks/ is forbidden (handoff
            2026-05-26). To proceed: create the pre-research doc (the gate
            relaxes once it exists), or deactivate this skill for a one-off.
prose: |
  The SOFT side of the scope-authoring gate. It fires on prompt_submit when
  the user's message shows scope-authoring intent and nudges toward the
  pre-research → task-spec-author → 11-field-verify discipline. The HARD side
  (inline-spec-block, SD.3) blocks the actual Write/Edit when a spec lands
  with no pre-research artifact.

  The intent regexes run inside the `text_pattern_match` primitive (plain JS
  RegExp — PCRE allowed), NOT inside an `if:` clause (the `if:` grammar's
  `match()` uses RE2 and rejects lookarounds). Keep intent detection in the
  primitive. `warn` (not `block`) keeps a false positive cheap — a prompt is
  not a destructive action.

  Per project_opensquid_no_agent_loop: opensquid cannot invoke the
  `task-spec-author` Claude Code skill itself. It emits the directive; the
  agent complies. This skill is a gate, never an orchestrator.
