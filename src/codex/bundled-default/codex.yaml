# =====================================================================
# Open Squid bundled-default codex (drift-as-codex chunk 1, 0.7.3+)
#
# Encodes today's hardcoded drift gates as YAML data:
#   - `drifts/`     — ports DRIFT_PATTERNS from src/hooks/drift-patterns.ts
#   - `workflows/`  — encodes the locked 7-phase workflow as a CodexWorkflowEntry
#   - `claims/`     — ports the honesty-ledger catalog (subset; full catalog ports later)
#   - `policies/`   — encodes the PATCH-ONLY pre-1.0 versioning policy
#                     ([[feedback_pre1_versioning]]) + the workflow-gate
#                     phase-logged requirement
#
# The hooks still use their hardcoded TypeScript today. The loader
# (next chunk) will: read the active project's codex, merge with THIS
# bundled-default, expose typed lists. Until then this file is
# documentation-of-intent + the schema-parser fixture for tests.
#
# Anyone disagreeing with these defaults can ship their own codex
# overriding any section — that's the whole point of the refactor.
# =====================================================================

id: opensquid-default
version: "1.0.0"
author:
  name: "Open Squid"
  contact: "https://github.com/smlee/opensquid"
license: "MIT"
description: |
  Default drift-protection codex bundled with Open Squid. Encodes the
  rules the project author runs in their own sessions: 7-phase
  workflow, PATCH-ONLY pre-1.0 versioning, the standard drift catalog
  (never-amend, no-implicit-push, substrate-purity, no-force-push-main),
  honesty-ledger claim catalog. Override sections in your own codex to
  customize without forking the npm package.

# ---------------------------------------------------------------------
# Drifts — port of DRIFT_PATTERNS in src/hooks/drift-patterns.ts
# ---------------------------------------------------------------------

drifts:
  - id: never-amend
    tool: Bash
    trigger:
      kind: bash_regex
      pattern: 'git\s+commit\b[^\n]*\s--amend\b'
    lesson: auto-commit
    severity: block
    message: >-
      BLOCKED: `git commit --amend` violates the never-amend rule
      (CLAUDE.md claude-overrides:v1, feedback_auto_commit). Even on
      unpushed commits — make a follow-up commit instead. Override
      only if the user explicitly requested an amend in THIS turn.

  - id: no-implicit-push
    tool: Bash
    trigger:
      kind: bash_regex
      pattern: 'git\s+push\b'
    lesson: auto-commit
    severity: block
    message: >-
      BLOCKED: `git push` requires explicit user authorization. Commits
      stay local until the user says push. If the user just said to
      push (or has pre-authorized pushes per CLAUDE.md), bypass with
      OPENSQUID_SKIP_DRIFT=1 for this command.

  - id: substrate-purity
    tool: Bash
    trigger:
      kind: bash_regex
      pattern: 'loop/engine.*git\s+commit[^\n]*-m[^\n]*(codex|opensquid|MindCraftor)'
      strip_quotes: false
    lesson: code-quality
    severity: warn
    message: >-
      WARN: engine commit message appears to reference a
      consumer-product concept (codex / opensquid / MindCraftor).
      Engine commit messages must stay substrate-pure — engine speaks
      in engine types only. Re-word using Pack provenance / lesson /
      authorship terminology.

  - id: no-force-push-main
    tool: Bash
    trigger:
      kind: bash_regex
      pattern: 'git\s+push\b[^\n]*(--force|-f)\b[^\n]*\b(main|master)\b'
    lesson: auto-commit
    severity: block
    message: >-
      BLOCKED: force-push to main/master is destructive. Requires
      explicit user request — and even then, prefer a regular push or
      a new branch.

# ---------------------------------------------------------------------
# Workflows — the locked 7-phase rule per [[feedback_workflow_cycle]]
# ---------------------------------------------------------------------

workflows:
  - id: standard-7-phase
    description: >-
      The locked 7-phase workflow. Every substantive task runs
      pre_research → learn → code → test → audit → post_research →
      fix before its terminal action (commit). Phase entries live in
      ~/.opensquid/phase_ledger/<session>/<task>/<phase>.yaml.
    enforce_on:
      - git_commit
    phases:
      - name: pre_research
        required: true
        description: >-
          Survey state, identify what's safe to ship, scope the work
          before writing code.
      - name: learn
        required: true
        description: >-
          Confirm conventions, language idioms, framework patterns
          relevant to the task.
      - name: code
        required: true
        description: >-
          Make the actual change. Logging skip allowed for
          docs-only or operational tasks.
      - name: test
        required: true
        description: >-
          Run the locked pre-push checklist (typecheck + prettier +
          build + test for opensquid; fmt + clippy + nightly
          public-api + test for engine).
      - name: audit
        required: true
        description: >-
          Review the diff for issues — versioning compliance, drift
          patterns, edge cases. Frequently catches real defects.
      - name: post_research
        required: true
        description: >-
          Validate the approach against memory + locked rules before
          shipping. Catches "drift from intent."
      - name: fix
        required: false
        description: >-
          Address findings from audit / post_research. Skip-with-
          reason allowed when audit found nothing actionable; log
          `note: not needed, audit clean` for the skip.

default_workflow_id: standard-7-phase

# ---------------------------------------------------------------------
# Claims — full port of honesty-ledger catalog (chunk 3b, 0.7.17).
# Honesty-ledger loads these via the loader + bridge in honesty-ledger.ts.
# Patterns and evidence shapes match the previous TS-hard-coded array
# byte-for-byte; severity is `warn` (record-but-don't-block).
# ---------------------------------------------------------------------

claims:
  - id: research-start
    claim_pattern: '\b(pre-?research|research)\s+(starting|begins?)\b'
    evidence:
      kind: tool_call
      tool: Agent
    unfulfilled_message: spawn a research agent or do explicit reading
    severity: warn

  - id: research-spawning
    claim_pattern: '\bspawn(?:ing)?\s+(?:a\s+)?(?:research\s+)?agent\b'
    evidence:
      kind: tool_call
      tool: Agent
    unfulfilled_message: spawn a research agent
    severity: warn

  - id: starting-now
    claim_pattern: '\b(?:starting|kicking off)\s+(?:#?\w+\s+)?now\b'
    evidence:
      kind: any_tool
    unfulfilled_message: actually start the work (any tool call counts)
    severity: warn

  - id: running-tests
    claim_pattern: '\brunning\s+(?:the\s+)?tests?\b|\btests?\s+pass(?:ing|ed|es)?\b'
    evidence:
      kind: bash_regex
      pattern: '(npm\s+test|cargo\s+test|vitest|jest)'
    unfulfilled_message: run npm test / cargo test
    severity: warn

  - id: running-build
    claim_pattern: '\brunning\s+(?:the\s+)?build\b|\bbuild\s+(?:pass(?:ing|es|ed)?|clean|green)\b'
    evidence:
      kind: bash_regex
      pattern: '(npm\s+run\s+build|cargo\s+build|tsc)'
    unfulfilled_message: run the build
    severity: warn

  - id: committed
    claim_pattern: '\b(?:committed|just committed|committing)\b'
    evidence:
      kind: bash_regex
      pattern: 'git\s+commit\b'
    unfulfilled_message: git commit
    severity: warn

  - id: audit-done
    claim_pattern: '\b(?:audit\s+(?:done|complete|✅)|Phase\s+\d+\s*[—-]\s*Audit)\b'
    evidence:
      kind: any_tool
    unfulfilled_message: do the audit (any inspection tool call)
    severity: warn

  - id: telegram-sent
    claim_pattern: '\b(?:telegram(?:\s+(?:report|message))?\s+(?:sent|delivered)|sent\s+(?:to|via)\s+telegram|pinged\s+(?:you|telegram))\b'
    evidence:
      kind: any_of
      options:
        - kind: tool_call
          tool: mcp__plugin_telegram_telegram__reply
        - kind: tool_call
          tool: mcp__opensquid__chat_send
    unfulfilled_message: call mcp__plugin_telegram_telegram__reply or mcp__opensquid__chat_send
    severity: warn

  - id: pushed
    claim_pattern: '\b(?:pushed|pushing)\s+(?:to\s+(?:origin|main|remote|github)|it|up|the\s+(?:commit|engine|opensquid|tag|fix|changes?|branch|release|PR|update))\b'
    evidence:
      kind: bash_regex
      pattern: 'git\s+push\b'
    unfulfilled_message: git push origin <branch>
    severity: warn

  - id: tagged
    claim_pattern: '\b(?:just\s+)?tagged\s+v?\d+\.\d+(?:\.\d+)?\b|\bcreated\s+(?:the\s+|a\s+)?tag\s+v?\d+\.\d+\b|\bnew\s+tag\s+v?\d+\.\d+\b'
    evidence:
      kind: bash_regex
      pattern: 'git\s+tag\b'
    unfulfilled_message: git tag <name>
    severity: warn

  - id: phase-logged
    claim_pattern: '\b(?:logged|logging)\s+(?:the\s+)?(?:audit|post[_-]?research|fix|test|code|learn|pre[_-]?research)\s+phase\b|\bphases?\s+logged\b'
    evidence:
      kind: tool_call
      tool: mcp__opensquid__log_phase
    unfulfilled_message: call mcp__opensquid__log_phase
    severity: warn

  - id: fmt-clippy
    claim_pattern: '\b(?:fmt|clippy|prettier|formatting)\s+(?:clean|passes?|passing|green|ok|✅)\b'
    evidence:
      kind: bash_regex
      pattern: '(cargo\s+(?:fmt|clippy)|prettier|npm\s+run\s+(?:format|lint))'
    unfulfilled_message: run cargo fmt / cargo clippy / prettier / npm run format
    severity: warn

  - id: version-slot-assignment
    claim_pattern: "\\b(?:next\\s+minor|next\\s+major|bump(?:ing)?\\s+(?:to\\s+)?(?:minor|major)|ships?\\s+as\\s+v?[0-9]+\\.[0-9]+\\.[0-9]+)\\b|(?:\\bI'?(?:ll| will|m| am)\\b|\\blet'?s\\b|\\blet\\s+me\\b|\\bgoing\\s+to\\b|\\bgonna\\b|\\bbump(?:ing|s)?\\s+(?:to\\s+)?|\\bship(?:ping|s)?\\s+(?:as\\s+|to\\s+)?|\\breleas(?:e|es|ing)\\s+(?:as\\s+)?|\\btag(?:ging|s)?\\s+(?:as\\s+)?|\\bnam(?:e|es|ing)\\b|\\bpick(?:ing|s)?\\s+(?:slot\\s+)?)[^.\\n\\r]{0,40}?\\bv?(?:0\\.[89]|0\\.1[0-9]|1\\.[0-9]+)(?:\\.[0-9]+)?\\b"
    evidence:
      kind: any_of
      options:
        - kind: tool_call
          tool: AskUserQuestion
        - kind: tool_call
          tool: TaskCreate
        - kind: tool_call
          tool: TaskUpdate
    unfulfilled_message: ASK the user before naming a non-patch version slot (call AskUserQuestion); never pick v0.8/v0.9/v1.0 unilaterally
    severity: warn

  - id: phase-claim-forward
    claim_pattern: '(?:\bPhase\s+[1-7](?:\s*\/\s*7)?\s*[—\-:]\s*(?:pre[_-]?research|learn|code|test|audit|post[_-]?research|fix)\b)|(?:\b(?:starting|entering|moving\s+to|now\s+in)\s+(?:phase\s+)?(?:pre[_-]?research|learn|code|test|audit|post[_-]?research|fix)\b)'
    evidence:
      kind: tool_call
      tool: mcp__opensquid__log_phase
    unfulfilled_message: call mcp__opensquid__log_phase for the phase you announced
    severity: warn

  - id: session-no-task
    claim_pattern: "\\b(?:(?:I'?(?:'?m|'?ll)|now\\s+i'?(?:m|ll))\\s+executing|now\\s+i'?ll|let\\s+me\\s+(?:run|execute|implement|fix|build|wire)|i'?ll\\s+(?:run|implement|fix|build|wire))\\b"
    evidence:
      kind: any_of
      options:
        - kind: tool_call
          tool: TaskCreate
        - kind: tool_call
          tool: TaskUpdate
        - kind: tool_call
          tool: TaskGet
    unfulfilled_message: create or update a task (TaskCreate/TaskUpdate) before doing substantive work — keeps the workflow-gate enforceable
    severity: warn

# ---------------------------------------------------------------------
# Policies — declarative rules higher-level gates enforce
# ---------------------------------------------------------------------

policies:
  - id: versioning-pre1-patch-only
    kind: versioning
    params:
      # Pre-1.0 PATCH-ONLY rule per [[feedback_pre1_versioning]] v4.
      # The agent may only bump patch. Minor/major slot allocation is
      # exclusively the user's call.
      per_commit_required: true
      allowed_slots:
        - patch
      slot_for:
        bug_fix: patch
        feature: patch
        breaking: patch

  - id: phase-logged-7-phase
    kind: phase_logged
    params:
      workflow_id: standard-7-phase
      enforce_on:
        - git_commit
