# enter-scoping — a scope-authoring prompt advances idle → scoping.
# advance_fsm(scope_start) only has a transition out of `idle`, so this is a
# no-op once the workflow has already started (total FSM).
name: enter-scoping
load: preload
when_to_load: []
triggers:
  - kind: prompt_submit
rules:
  - id: enter-scoping
    process:
      - call: text_pattern_match
        args:
          text_field: prompt
          patterns:
            - '\bspec(?:c?ing|ced)?\b'
            - '\bscope\b'
            - '\bnew\s+(?:task|track)\b'
            - '\badd\s+(?:a\s+|another\s+)?(?:task|track)\b'
            - '\bdesign\b'
            - '\bplan\b'
        as: intent
      - call: advance_fsm
        if: 'len(intent.matched) > 0'
        args:
          event: scope_start
prose: |
  Enters the workflow lifecycle when a prompt looks like scope-authoring intent.
  The FSM does the rest of the gating — this only fires the scope_start event.
