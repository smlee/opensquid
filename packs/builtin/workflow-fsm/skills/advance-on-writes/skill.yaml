# advance-on-writes — the pre-research / spec / task-load milestone writes
# advance the workflow FSM and capture the enrichment paths into session state
# (read back by the handoff directives). Replaces the hardcoded PreToolUse
# chain-state writers.
name: advance-on-writes
load: preload
when_to_load: []
triggers:
  - kind: tool_call
rules:
  - id: advance-research-done
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      - call: advance_fsm
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")'
        args:
          event: research_done
      - call: write_state
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")'
        args:
          key: workflow-pre-research-path
          value: '{{targs.file_path}}'
  - id: advance-spec-authored
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      - call: advance_fsm
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md")'
        args:
          event: spec_authored
      - call: write_state
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md")'
        args:
          key: workflow-spec-path
          value: '{{targs.file_path}}'
  - id: advance-tasks-loaded
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      - call: advance_fsm
        if: '(tool == "TaskCreate" || tool == "TaskUpdate") && len(targs.metadata.taskId) > 0'
        args:
          event: tasks_loaded
prose: |
  Milestone-write detectors. A pre-research artifact write advances → researched
  (and stores its path); a track-spec write advances → spec_authored (stores its
  path); a TaskCreate/Update carrying metadata.taskId advances → tasks_loaded.
