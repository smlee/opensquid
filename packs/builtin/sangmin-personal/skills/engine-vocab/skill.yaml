# engine-vocab — substrate-purity warn for engine-repo commits.
#
# Ported from bundled-default/pack.yaml drifts[2]. Soft warn (not a block)
# because the rule is style-level — engine commit messages must speak in
# engine types only. The user fixes the wording and continues.
name: engine-vocab
load: lazy
when_to_load:
  - tool_match: Bash
rules:
  - id: substrate-purity
    process:
      - call: match_command
        args:
          pattern: 'loop/engine.*git\s+commit[^\n]*-m[^\n]*(pack|opensquid|MindCraftor)'
          target: tool_args.command
        as: hit
      - call: verdict
        if: hit
        args:
          level: warn
          message: >-
            WARN: engine commit message references a consumer-product
            concept (pack / opensquid / MindCraftor). Engine speaks in
            engine types only — re-word using substrate vocabulary.
prose: |
  Substrate-purity discipline: the engine repo is the open-source
  substrate; its commit messages must not name any consumer-product
  concept. A warn (not a block) keeps the friction low — the user
  re-words and moves on.
