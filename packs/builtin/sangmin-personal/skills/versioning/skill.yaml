# versioning — pre-1.0 PATCH-ONLY rule.
#
# Ports the legacy `versioning-pre1-patch-only` policy from
# bundled-default/codex.yaml lines 293–306. Per
# feedback_pre1_versioning v4: every change of any kind ships as a patch
# bump; the agent never picks a minor or major slot — that is exclusively
# the user's call.
#
# Two detection paths:
#   - `npm version minor` / `npm version major` commands.
#   - manual edits to package.json that bump into 0.8 / 0.9 / 1.x.
name: versioning
load: lazy
when_to_load:
  - tool_match: Bash
  - file_glob: '**/package.json'
rules:
  - id: versioning-pre1-patch-only
    process:
      - call: match_command
        args:
          pattern: 'npm\s+version\s+(minor|major)\b'
          target: tool_args.command
        as: cmd_hit
      - call: verdict
        if: cmd_hit
        args:
          level: block
          message: >-
            BLOCKED: pre-1.0 is PATCH-ONLY. The agent may only bump
            patch. Minor/major slot allocation is exclusively the
            user's call (feedback_pre1_versioning v4).
prose: |
  Pre-1.0 versioning is patch-only. Minor/major slots are reserved for
  the user. If the user explicitly directs a non-patch bump, the agent
  proceeds — but the agent never picks the slot unilaterally.
