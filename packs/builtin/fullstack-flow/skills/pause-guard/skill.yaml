# pause-guard (T2.9, AF.6/AF.7) — the fullstack-flow v2 equivalent of v1 coding-flow's pause
# discipline (the ≥v1 floor). Questions/pauses are allowed ONLY in SCOPE (the interactive stage);
# PAST SCOPE the run is automated and there are no pauses. This guard HARD-BLOCKS a real-time pause
# ACTION (AskUserQuestion / Stop) whenever the fullstack-flow FSM is not in the `scope` state.
#
# DIVERGENCE FROM THE SPEC'S LITERAL SHAPE (noted, prefer shipped reality):
#   - the spec's `call: block` does NOT exist as a primitive — the shipped terminal-block primitive is
#     `verdict` with `level: block` (src/functions/verdict.ts). v1's pause skills use the same.
#   - the spec's `if: phase != 'scope'` references a bare `phase`, but the SKILL evaluator
#     (evaluateProcess → evalCondition over ctx.bindings) does NOT bind `phase` (that binding lives only
#     in the v2 GATE path's buildGuardCtx, NOT the skill path). So `phase` is bound here exactly as v1
#     binds its FSM state — via `read_fsm_state as: phase`. For fullstack-flow the FSM `initial: scope`,
#     so `read_fsm_state` returns `scope` while in SCOPE and `phase != "scope"` is the post-scope check.
#   - the expression grammar requires DOUBLE-quoted string literals (single quotes fail the lexer) and
#     supports `len(x)` (the spec's `.length` parses too, but `len()` matches v1's pause skills), so the
#     spec's `is_pause.matched.length > 0 && phase != 'scope'` is written `len(is_pause.matched) > 0 &&
#     phase != "scope"` — same predicate, valid grammar.
#   - `text_pattern_match` matches against `text_field: tool` — the tool name on the tool_call event
#     (`event.tool`), resolved by the primitive's dot-path field extraction. This is faithful to the
#     spec's `^(AskUserQuestion|Stop)$` pattern against the tool name.
name: pause-guard
load: preload
when_to_load: []
triggers:
  - kind: tool_call
rules:
  - id: no-pause-past-scope
    process:
      # The fullstack-flow FSM state — `scope` while in SCOPE (the only stage where pauses are allowed).
      - call: read_fsm_state
        as: phase
      # Match the current tool name (event.tool) against the pause-ACTION set.
      - call: text_pattern_match
        as: is_pause
        args:
          text_field: tool
          patterns:
            - '^(AskUserQuestion|Stop)$'
      # HARD-BLOCK a pause action PAST SCOPE. Questions belong to SCOPE; past it the run is automated.
      # Gated by the same condition so the verdict only fires when a pause is actually attempted post-scope.
      - call: verdict
        if: 'len(is_pause.matched) > 0 && phase != "scope"'
        args:
          level: block
          message: >-
            Past SCOPE there are no pauses — run to done (AF.6/AF.7). Questions/pauses belong to the
            interactive SCOPE stage; past it the fullstack-flow run is automated. Do not pause for a
            question or stop mid-run: if a real gap surfaced the SCOPE was incomplete — re-scope it,
            do not stall the run.
prose: |
  The fullstack-flow pause discipline (the ≥v1 floor): pauses/questions are allowed ONLY in the
  interactive SCOPE stage. A real-time pause ACTION (AskUserQuestion / Stop) past SCOPE is HARD-BLOCKED
  over the fullstack-flow FSM state — the automated stages (PLAN/AUTHOR/CODE/DEPLOY) take no pauses.
