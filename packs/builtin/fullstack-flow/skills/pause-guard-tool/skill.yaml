# pause-guard-tool (H5, AF.6/AF.7) — blocks the AskUserQuestion/Stop TOOL post-scope.
#
# v2 state-keyed model: this skill is BOUND (via fullstack-flow/pack.yaml per-state `skills:`) ONLY to the
# post-scope gates (plan/author/code/deploy), NEVER to `scope`. So the BINDING is the post-scope gate — there is
# NO in-rule phase check (that's why pause-guard was split per trigger; a single skill cannot tell which event
# kind fired it, and `read_fsm_state` is unavailable in the v2 skill ctx). The rule only matches WHICH tool to
# block; the `tool_call` trigger + the binding do the rest.
name: pause-guard-tool
load: preload
when_to_load: []
triggers:
  - kind: tool_call
rules:
  - id: no-pause-tool
    process:
      # Bind the tool name into ctx.bindings (evalCondition reads bindings, not the event directly).
      - call: tool_name
        as: tool
      # HARD-BLOCK a pause-action tool. Binding guarantees this only runs post-scope; no phase check needed.
      - call: verdict
        if: 'tool == "AskUserQuestion" || tool == "Stop"'
        args:
          level: block
          message: >-
            Past SCOPE there are no pauses — run to done (AF.6/AF.7). Questions/pauses belong to the
            interactive SCOPE stage; past it the fullstack-flow run is automated. If a real gap surfaced
            the SCOPE was incomplete — re-scope it, do not stall the run.
prose: |
  The fullstack-flow pause discipline (the ≥v1 floor): a pause-action TOOL (AskUserQuestion / Stop) is
  HARD-BLOCKED past SCOPE. State-keyed — bound only to the automated post-scope gates.
