# content-audit — the GUESS-FREE content-audit RUNNER for v2 fullstack-flow (GFR.1). v2 kept the deterministic
# facet-gates (scope.anchors_ok, plan.acyclic, …) but DROPPED the qualitative guess-free standard v1 ran via
# read_rubric + a spawned adversarial audit. This skill restores that audit AS A PRODUCER ONLY: on the
# advancing artifact write it reads the ACTIVE-pack rubric (read_rubric resolves ctx.packId → fullstack-flow,
# GFR.1) and runs a bounded parallel lens fan-out through prompt-hash-memoized `cached_audit`, which PERSISTS
# one merged verdict to `fullstack-flow-<stage>-audit-cache`. It does NOT advance the FSM — the v2 GATE
# (pack.yaml, GFR.2) reads the cache via buildGuardCtx and is what blocks. Failed lens findings are surfaced to
# the active StageProcess as a warning; only the merged all-lenses-pass verdict authorizes the gate.
#
# STAGES — all four audited, each by its OWN artifact + trigger:
#   SCOPE  — a `docs/research/*-pre-research-*` Write/Edit (the artifact is the doc).
#   AUTHOR — a `docs/tasks/T-*.md` Write/Edit (the artifact is the doc).
#   PLAN   — a work-graph mutation (GFR.1b): the artifact is the serialized work-graph + scope (`serialize_plan`).
#   CODE   — the audit-phase log (GFR.1c): the artifact is the uncommitted diff (`staged_diff`), EXTERNAL review
#            distinct from the agent-side fan-out in procedure/code.md (anti-self-grading).
# Each writes `fullstack-flow-<stage>-audit-cache`, read by buildGuardCtx; read_rubric resolves all four.
#
# FAIL-LOUD: never run rubric-less (read_rubric → null ⇒ the cached_audit `if` is false ⇒ no audit runs ⇒ the
# cache stays absent ⇒ readVerdict → undefined ⇒ the GFR.2 gate's `startsWith(audit.<stage>, …)` is false ⇒ the
# gate BLOCKS). A missing rubric can never masquerade as a pass. `on_error: continue` so a spawn timeout binds
# the error to `audit` (uncached) and the NEXT write retries — never freezes the flow (v1 F0c discipline).
name: content-audit
load: preload
when_to_load: []
triggers:
  - kind: tool_call
rules:
  # ── SCOPE: the guess-free audit of the pre-research artifact (NEVER-GUESS · BEST-SOLUTION · FULL-FIX ·
  #    coverage · ON-TOPIC — fullstack-flow/rubric/scope.md). Mirrors scope-lifecycle:99-130.
  - id: scope-guess-free-audit
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      # The EFFECTIVE post-write content (Write→content, Edit→file with old→new applied) so the audit sees the
      # REAL resulting artifact, not the Edit-empty targs.content (T-FLOW-AUDIT-ARTIFACT).
      - call: effective_content
        if: '(tool == "Write" || tool == "Edit") && ((contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")) || (contains(targs.file_path, "docs/design/") && contains(targs.file_path, ".md")))'
        as: effective
      # read_rubric resolves the ACTIVE pack (ctx.packId = fullstack-flow, GFR.1) → fullstack-flow/rubric/scope.md.
      - call: read_rubric
        if: '(tool == "Write" || tool == "Edit") && ((contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")) || (contains(targs.file_path, "docs/design/") && contains(targs.file_path, ".md")))'
        args: { name: scope }
        as: rubric
      # F5 — the BRANCHED cache key: a `docs/design/*.md` verdict keys PER-DOC (from file_path), the pre-research
      # artifact keeps the session-wide `fullstack-flow-scope-audit-cache` (so v2_supply's scope-stage read is
      # never stranded). Same derivation the design-doc REWRITE reader uses → writer/reader keys always agree.
      - call: scope_audit_cache_key
        if: '(tool == "Write" || tool == "Edit") && ((contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")) || (contains(targs.file_path, "docs/design/") && contains(targs.file_path, ".md")))'
        args:
          file_path: '{{targs.file_path}}'
          base_key: fullstack-flow-scope-audit-cache
        as: scope_cache_key
      # FAIL-LOUD: only spawn when the rubric loaded (rubric != null). A null rubric ⇒ no cache ⇒ the gate blocks.
      - call: cached_audit
        if: '(tool == "Write" || tool == "Edit") && ((contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")) || (contains(targs.file_path, "docs/design/") && contains(targs.file_path, ".md"))) && rubric != null'
        on_error: continue
        args:
          cache_key: '{{scope_cache_key}}'
          model: reasoning
          timeout_ms: 600000
          # Freshness anchor: the gate re-hashes the current scope artifact and ignores any older verdict.
          # This prevents an audit timeout on changed content from exposing a stale GUESS_FREE result.
          subject: '{{effective}}'
          lenses:
            - id: evidence
              criteria: ['1', '5', '6']
              prompt: >-
                Audit ONLY SCOPE rubric criteria 1, 5, and 6 (NEVER-GUESS, ON-TOPIC, SOURCE-LADDER) against the
                complete artifact. Treat still-current primary citations and cited prior research in these bytes as
                completed evidence regardless of which session retrieved it; never demand a duplicate fetch.
                Begin with exactly `VERDICT: GUESS_FREE` only if all assigned criteria pass;
                otherwise begin `VERDICT: UNRESOLVED` and list every concrete finding. RUBRIC:\n\n{{rubric}}\n\n
                ARTIFACT:\n\n{{effective}}
            - id: solution
              criteria: ['2', '3', '4']
              prompt: >-
                Audit ONLY SCOPE rubric criteria 2, 3, and 4 (BEST-SOLUTION, FULL-FIX, FULL-SCOPE) against the
                complete artifact. Begin with exactly `VERDICT: GUESS_FREE` only if all assigned criteria pass;
                otherwise begin `VERDICT: UNRESOLVED` and list every concrete finding. RUBRIC:\n\n{{rubric}}\n\n
                ARTIFACT:\n\n{{effective}}
            - id: modularity-authority
              criteria: ['7', '9']
              prompt: >-
                Audit ONLY SCOPE rubric criteria 7 and 9 (MODULARITY and SINGLE-SOURCE-OF-TRUTH) against the
                complete artifact. Begin with exactly `VERDICT: GUESS_FREE` only if both assigned criteria pass;
                otherwise begin `VERDICT: UNRESOLVED` and list every concrete finding. RUBRIC:\n\n{{rubric}}\n\n
                ARTIFACT:\n\n{{effective}}
            - id: scalability-flow
              criteria: ['8', '10']
              prompt: >-
                Audit ONLY SCOPE rubric criteria 8 and 10 (SCALABILITY and PUSH-vs-PULL) against the complete
                artifact. Begin with exactly `VERDICT: GUESS_FREE` only if both assigned criteria pass;
                otherwise begin `VERDICT: UNRESOLVED` and list every concrete finding. RUBRIC:\n\n{{rubric}}\n\n
                ARTIFACT:\n\n{{effective}}
        as: audit
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && rubric != null && !startsWith(audit, "VERDICT: GUESS_FREE")'
        args:
          level: warn
          message: 'SCOPE audit findings:\n{{audit}}'
  # ── AUTHOR: the guess-free audit of the task spec (SIMPLICITY · real-code · coverage —
  #    fullstack-flow/rubric/author.md). Mirrors scope-lifecycle:206-258.
  - id: author-guess-free-audit
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      - call: effective_content
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md")'
        as: effective
      - call: read_rubric
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md")'
        args: { name: author }
        as: rubric
      - call: cached_audit
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md") && rubric != null'
        on_error: continue
        args:
          cache_key: fullstack-flow-author-audit-cache
          model: reasoning
          timeout_ms: 600000
          lenses:
            - id: contract-coverage
              criteria: ['1', '2', '3']
              prompt: >-
                Audit ONLY AUTHOR rubric criteria 1, 2, and 3 (contract, complete coverage, live wiring) against
                the complete spec. Begin with exactly `VERDICT: GUESS_FREE` only if all assigned criteria pass;
                otherwise begin `VERDICT: UNRESOLVED` and list every concrete finding. RUBRIC:\n\n{{rubric}}\n\n
                SPEC:\n\n{{effective}}
            - id: correctness-reuse
              criteria: ['4', '6']
              prompt: >-
                Audit ONLY AUTHOR rubric criteria 4 and 6 (technical correctness and existing-solution search)
                against the complete spec. Begin with exactly `VERDICT: GUESS_FREE` only if both criteria pass;
                otherwise begin `VERDICT: UNRESOLVED` and list every concrete finding. RUBRIC:\n\n{{rubric}}\n\n
                SPEC:\n\n{{effective}}
            - id: simplicity-architecture
              criteria: ['5', '7', '8']
              prompt: >-
                Audit ONLY AUTHOR rubric criteria 5, 7, and 8 (simplicity, single source of truth, modularity)
                against the complete spec. Begin with exactly `VERDICT: GUESS_FREE` only if all assigned criteria
                pass; otherwise begin `VERDICT: UNRESOLVED` and list every concrete finding.
                RUBRIC:\n\n{{rubric}}\n\nSPEC:\n\n{{effective}}
            - id: rolling-plan
              criteria: ['9']
              prompt: >-
                Audit ONLY AUTHOR rubric criterion 9 (rolling PLAN re-audit) against the complete spec and its
                cited plan evidence. Begin with exactly `VERDICT: GUESS_FREE` only if it passes; otherwise begin
                `VERDICT: UNRESOLVED` and list every concrete finding. RUBRIC:\n\n{{rubric}}\n\n
                SPEC:\n\n{{effective}}
        as: audit
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && rubric != null && !startsWith(audit, "VERDICT: GUESS_FREE")'
        args:
          level: warn
          message: 'AUTHOR audit findings:\n{{audit}}'
  # ── PLAN: the guess-free audit of the work-graph decomposition (no-guess deps · on-topic · re-audit-scope —
  #    fullstack-flow/rubric/plan.md). Artifact is the WORK-GRAPH (serialize_plan), NOT a doc write; the trigger
  #    is a work-graph mutation. MCP tool names carry the mcp__opensquid__ prefix → match by substring. (GFR.1b)
  - id: plan-guess-free-audit
    process:
      - call: tool_name
        as: tool
      - call: serialize_plan
        if: 'contains(tool, "workgraph_create_issue") || contains(tool, "workgraph_add_edge") || contains(tool, "workgraph_update_issue")'
        as: plan_artifact
      - call: read_rubric
        if: '(contains(tool, "workgraph_create_issue") || contains(tool, "workgraph_add_edge") || contains(tool, "workgraph_update_issue")) && plan_artifact != null'
        args: { name: plan }
        as: rubric
      - call: cached_audit
        if: '(contains(tool, "workgraph_create_issue") || contains(tool, "workgraph_add_edge") || contains(tool, "workgraph_update_issue")) && plan_artifact != null && rubric != null'
        on_error: continue
        args:
          cache_key: fullstack-flow-plan-audit-cache
          model: reasoning
          timeout_ms: 600000
          lenses:
            - id: coverage-topic
              criteria: ['1', '4']
              prompt: >-
                Audit ONLY PLAN rubric criteria 1 and 4 (complete coverage and on-topic traceability) against the
                complete plan. Begin with exactly `VERDICT: GUESS_FREE` only if both criteria pass; otherwise
                begin `VERDICT: UNRESOLVED` and list every concrete finding. RUBRIC:\n\n{{rubric}}\n\n
                PLAN:\n\n{{plan_artifact}}
            - id: graph-correctness
              criteria: ['2', '3']
              prompt: >-
                Audit ONLY PLAN rubric criteria 2 and 3 (acyclicity and derived dependencies) against the complete
                plan. Begin with exactly `VERDICT: GUESS_FREE` only if both criteria pass; otherwise begin
                `VERDICT: UNRESOLVED` and list every concrete finding. RUBRIC:\n\n{{rubric}}\n\n
                PLAN:\n\n{{plan_artifact}}
            - id: rolling-scope
              criteria: ['5']
              prompt: >-
                Audit ONLY PLAN rubric criterion 5 (rolling SCOPE re-audit) against the complete plan and cited
                scope evidence. Begin with exactly `VERDICT: GUESS_FREE` only if it passes; otherwise begin
                `VERDICT: UNRESOLVED` and list every concrete finding. RUBRIC:\n\n{{rubric}}\n\n
                PLAN:\n\n{{plan_artifact}}
        as: audit
      - call: verdict
        if: 'rubric != null && plan_artifact != null && !startsWith(audit, "VERDICT: GUESS_FREE")'
        args:
          level: warn
          message: 'PLAN audit findings:\n{{audit}}'
  # ── CODE: the guess-free audit of the DIFF (alignment · doc-use · existing-solution · full-fix · re-audit —
  #    fullstack-flow/rubric/code.md). Artifact is the git diff (staged_diff); the trigger is the audit-phase
  #    log. EXTERNAL reviewer — distinct from the agent-side fan-out in procedure/code.md (anti-self-grading). (GFR.1c)
  - id: code-guess-free-audit
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      - call: staged_diff
        if: 'contains(tool, "log_phase") && targs.phase == "audit"'
        as: diff
      - call: read_rubric
        if: 'contains(tool, "log_phase") && targs.phase == "audit" && diff != null'
        args: { name: code }
        as: rubric
      - call: cached_audit
        if: 'contains(tool, "log_phase") && targs.phase == "audit" && diff != null && rubric != null'
        on_error: continue
        args:
          cache_key: fullstack-flow-code-audit-cache
          model: reasoning
          timeout_ms: 600000
          # The raw diff as the freshness SUBJECT (GFR.2-hard staleness anchor): cached_audit records sha256(diff)
          # so the commit-gate can re-derive `git diff HEAD` and prove this GUESS_FREE verdict still certifies the
          # CURRENT diff — a verdict for a since-changed diff is rejected as stale (re-log audit on the new diff).
          subject: '{{diff}}'
          lenses:
            - id: before-code
              criteria: ['1', '2', '3', '4']
              prompt: >-
                Audit ONLY CODE rubric section A, criteria 1-4 (task verification, expansion, scope alignment,
                primary-doc use) against the complete diff and evidence. Begin with exactly `VERDICT: GUESS_FREE`
                only if every assigned criterion passes; otherwise begin `VERDICT: UNRESOLVED` and list every
                concrete finding. RUBRIC:\n\n{{rubric}}\n\nDIFF:\n\n{{diff}}
            - id: after-code
              criteria: ['5', '6', '7', '8', '9']
              prompt: >-
                Audit ONLY CODE rubric section B, criteria 5-9 (alignment, proper docs, existing solution,
                full-fix, external evidence) against the complete diff. Begin with exactly
                `VERDICT: GUESS_FREE` only if every assigned criterion passes; otherwise begin
                `VERDICT: UNRESOLVED` and list every concrete finding. RUBRIC:\n\n{{rubric}}\n\nDIFF:\n\n{{diff}}
            - id: architecture
              criteria: ['11', '12', '13', '14']
              prompt: >-
                Audit ONLY CODE rubric section C, criteria 11-14 (modularity, scalability, single source of truth,
                push-vs-pull) against the complete diff. Begin with exactly `VERDICT: GUESS_FREE` only if every
                assigned criterion passes; otherwise begin `VERDICT: UNRESOLVED` and list every concrete finding.
                RUBRIC:\n\n{{rubric}}\n\nDIFF:\n\n{{diff}}
            - id: rolling-author
              criteria: ['10']
              prompt: >-
                Audit ONLY CODE rubric section D, criterion 10 (rolling AUTHOR re-audit) against the complete diff
                and cited author evidence. Begin with exactly `VERDICT: GUESS_FREE` only if it passes; otherwise
                begin `VERDICT: UNRESOLVED` and list every concrete finding.
                RUBRIC:\n\n{{rubric}}\n\nDIFF:\n\n{{diff}}
        as: audit
      - call: verdict
        if: 'rubric != null && diff != null && !startsWith(audit, "VERDICT: GUESS_FREE")'
        args:
          level: warn
          message: 'CODE audit findings:\n{{audit}}'
prose: |
  The guess-free content-audit RUNNER for v2 fullstack-flow: each audited stage declares independent rubric
  lenses, cached_audit runs missing lenses concurrently, resumes completed lenses after a partial timeout, and
  merges them into exactly one gate-facing verdict. Every lens must pass before GUESS_FREE is emitted. Failed
  findings are surfaced to the active StageProcess; the pack gate remains the sole stage-advance authority.
