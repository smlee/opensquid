# accessibility — a lazy ENGINEERING lens (T2.13). Copies the seo-aeo-expert lens-skill shape, adapted to the
# fullstack-flow (coding-domain) pack. Loaded ONLY when selected → NO runtime cost otherwise (design §4.3).
#
# DIVERGENCE FROM THE SPEC'S LITERAL SHAPE (see security/skill.yaml for the full rationale; same for all 10):
#   - `requires: { domain: coding }` → `requires: []` (coding-domain select is at the PACK level via
#     fullstack-flow/pack.yaml `serves.domain`, matched by src/packs/match.ts); router shortlist via `prose:`.
#   - `rules[].inject[]` → `verdict` with `level: surface` (the registered, seo-aeo-expert-precedent primitive).
name: accessibility
# ORCH/fractal — a cross-cutting ENGINEERING lens: fires on every coding turn (no area gate).
serves:
  domain: coding
load: lazy
requires: []
triggers:
  - kind: tool_call
prose: |
  Accessibility lens for coding work — semantic markup, keyboard operability, focus management, color contrast,
  and ARIA used correctly. Selected for UI/interface code, components, forms, and anything a human interacts with.
rules:
  - id: accessibility-lens
    process:
      # FD2 — load the primary-sourced WCAG 2.2 + APG rules so the agent can query the full, cited set
      # (knowledge/accessibility.json) for source URLs + thresholds; the headline checks are surfaced below.
      - call: knowledge_lookup
        args:
          pack: fullstack-flow
          dataset: accessibility
          query: { severity: ['critical', 'high'] }
        as: a11y
      - call: verdict
        args:
          level: surface
          message: >-
            Accessibility lens (WCAG 2.2 + ARIA APG, primary-sourced — query
            knowledge_lookup(pack=fullstack-flow, dataset=accessibility) for the full cited set): prefer native
            HTML before ARIA; every interaction keyboard-operable (SC 2.1.1) with a visible focus indicator (SC
            2.4.7) that isn't obscured (SC 2.4.11); text contrast >= 4.5:1 (SC 1.4.3), UI/non-text >= 3:1 (SC
            1.4.11); target size >= 24px (SC 2.5.8); alt on every image (SC 1.1.1); a modal carries
            aria-modal + focus-trap + Esc + focus-restore (APG); honor prefers-reduced-motion (SC 2.3.3).
