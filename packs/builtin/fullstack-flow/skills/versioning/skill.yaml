# versioning — a lazy ENGINEERING lens (T2.13). Copies the seo-aeo-expert lens-skill shape, adapted to the
# fullstack-flow (coding-domain) pack. Loaded ONLY when selected → NO runtime cost otherwise (design §4.3).
#
# DIVERGENCE FROM THE SPEC'S LITERAL SHAPE (see security/skill.yaml for the full rationale; same for all 10):
#   - `requires: { domain: coding }` → `requires: []` (coding-domain select is at the PACK level via
#     fullstack-flow/pack.yaml `serves.domain`, matched by src/packs/match.ts); router shortlist via `prose:`.
#   - `rules[].inject[]` → `verdict` with `level: surface` (the registered, seo-aeo-expert-precedent primitive).
name: versioning
load: lazy
requires: []
triggers:
  - kind: tool_call
prose: |
  Versioning lens for coding work — semantic versioning, backward compatibility, API/schema migrations, and
  deprecation policy. Selected for changes to public APIs, shared schemas, package versions, or wire formats.
rules:
  - id: versioning-lens
    process:
      - call: verdict
        args:
          level: surface
          message: >-
            Versioning lens: A breaking change to any consumed contract (API, schema, wire format) is a MAJOR
            bump — additive/optional changes are minor; never repurpose an existing field. Ship migrations
            backward-compatible (expand, migrate, then contract) and deprecate with a window, not a hard cutover.
