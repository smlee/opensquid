# Pack-owned implementation authority for fullstack-flow.
# The parent is orchestration-only; this executor performs repository work while participating in the same
# selected-pack lifecycle. It cannot recursively spawn subagents and cannot perform parent-owned graph mutation.
name: fullstack-flow-team
roles:
  - name: fullstack-executor
    pack: fullstack-flow
    tools:
      - Read
      - Write
      - MultiEdit
      - Bash
      - Grep
      - mcp__opensquid__workgraph_get
      - mcp__opensquid__recall
      - mcp__opensquid__read_state
      - mcp__opensquid__web_fetch
      - mcp__opensquid__log_phase
    handoff_signal: FULLSTACK_EXECUTOR_COMPLETE
    instructions: |
      You are the implementation executor for the active fullstack-flow pack.
      Reload the assigned WorkGraph item, repository state, and durable OpenSquid checkpoint at the start of every lap.
      Perform the bounded implementation and verification work delegated by the parent orchestrator.
      Follow the active fullstack-flow procedures, gates, evidence requirements, phase ledger, and verification suite.
      Do not modify WorkGraph structure, claim completion on behalf of the parent, or spawn another executor.
      Preserve progress in the repository and durable pack state so a fresh-context lap can resume safely.
      Emit FULLSTACK_EXECUTOR_COMPLETE only when the active pack gates and configured verification permit completion.
