# fullstack-flow — the v2 rebuild of coding-flow as a single FSM-primary pack.yaml.
#
# The 5-stage discipline (SCOPE → PLAN → AUTHOR → CODE → DEPLOY → accept → done) modelled as ENFORCING gate
# checkpoints + an acceptance decision + a terminal, that COMPILES, VALIDATES (validateFsm: every emit routed,
# decision totality), LOADS, and ADVANCES on hook events through the live v2 runtime (V2ObservedActor /
# v2_supply). It is ADDITIVE + opt-in: v1 coding-flow stays the live default; fullstack-flow activates ONLY when
# pinned in active.json.
#
# T2.1 — each stage is now a DETERMINISTIC, ZERO-LLM gate (T2.4–T2.8): every `guard` is a pure predicate over
# `buildGuardCtx` and every `on_fail` is `block` (no always-true `ready` pass-through remains). The five gates:
#   scope_ready (T2.4), plan_ready (T2.5), author_ready (T2.6), code_ready (T2.7), deploy_ready (T2.8) +
#   the `accepted` decision (T2.8 durable human-accept). The PLAN-decompose / acceptance / per-stage reports /
#   goal-consult / pause-discipline / lens skills are wired by T2.5/T2.8–T2.13.
#
# WHY GATES, NOT EXECUTORS: the live observed actor advances only at gate/decision states
# (v2_observed_actor.ts:74 — an executor state is inert in observed mode). coding-flow is OBSERVED (the agent
# works in its own harness; opensquid watches hook events), so the faithful translation of v1's pure
# states+transitions is a gate chain whose triggers are hook events.
#
# Spec: loop/docs/tasks/T-v2-track2-discipline.md (T2.1). Design: loop/docs/design/opensquid-v2-coding-flow-design.md.
#
# FRONTEND DESIGN-INTELLIGENCE (T-frontend-design-pack, FD1–FD6) — the ui-ux-pro-max capability re-derived from
# PRIMARY sources, typed/cited/enforced INSIDE this pack (not a separate pack):
#   INPUT lenses (lazy, knowledge_lookup-backed): the 8 frontend lenses (visual-design, ux-heuristics,
#     frontend-performance, design-tokens, motion, i18n, content-microcopy, data-viz) joined the 10 engineering
#     lenses; `accessibility` was DEEPENED (WCAG 2.2 SC + APG) rather than duplicated — the overlap reconciliation.
#   KNOWLEDGE: packs/builtin/fullstack-flow/knowledge/<lens>.json — Zod-validated, each rule cites a primary URL.
#   OUTPUT (skills/frontend-output + primitives): design_system_generate (DTCG tokens, WCAG-enforced contrast),
#     component_scaffold (APG-correct), frontend_audit. The audit CAPABILITY remains available; its
#     `code_frontend_clean` enforcement guard is DEFINED but currently UNWIRED — its only evaluator was the bespoke
#     v2_enforce PreToolUse hook, removed as drift (enforcement belongs in the FSM gates/floors/commit-gate per the
#     canonical design, not a parallel hook). Per the build order (frontend is the last slice), re-wiring its
#     enforcement via the canonical commit-gate is deferred to the frontend slice.
name: fullstack-flow
version: 0.1.0
scope: workflow

# PACK-TAXONOMY (pack-taxonomy.md:105) — fullstack-flow is THE coding discipline, activated ON-DEMAND by the
# classified request (produce × coding), not pinned always-on.
activation: on-demand
# DISCIPLINE-DECLARATION (project-only-operation, opensquid-project-only-operation.md:86-93) — fullstack-flow is a
# coding flow whose main loop PLANS and dispatches executors; it imposes orchestrator-only discipline. opensquid
# owns the guard MECHANISM (runtime/guard/orchestrator_guard.ts); this DECLARES the POLICY that turns it on, so a
# project running fullstack-flow gets the orchestrator guard while a content/SEO project (no such declaration) does not.
#
# WHAT THE GUARD ENFORCES (user spec 2026-07-05) — ALWAYS-ON in this project's cwd + subdirectories, in BOTH
# interactive and automation sessions (NOT stage- or automation-gated): the main orchestrator loop may write
# DOCUMENTS only (Markdown / anything under `docs/`); a CODING-FILE write (src/packs/tests/config) is HARD-BLOCKED
# at PreToolUse — the freehand-proof boundary. The "unless": a STANDING human grant, the project-local
# `.opensquid/allow-code-write` flag (create once to permit, remove to revoke). Executor subagents (agent_id) are
# exempt — they implement what the orchestrator planned. This is PROJECT-SCOPED, never global (pre-tool-use.ts
# gates on `projectDeclaresOrchestratorOnly(cwd)`, which rejects the home/global scope).
discipline: { orchestrator_only: true }

# No detected_by gate — opt-in via active.json IS the pin (mirrors coding-flow; the user_pinned
# DetectionContext signal is never populated, so a detected_by clause would silently DISABLE the pack).
detected_by: []

# ORCH.1 serves contract — the orchestrator routes build work (produce × coding) to this pack.
serves: { intent: produce, domain: coding }

# Guard registry (ref → if:-expression, evaluated by RegistryGuardEvaluator over buildGuardCtx).
guards:
  # T2.4 / GS1 — the SCOPE gate: a deterministic, zero-LLM predicate. The `!scope.is_advance` short-circuit passes
  # EVERY non-advance event (so the gate never blocks mid-scoping); only a Write/Edit of a
  # `docs/research/*-pre-research-*` artifact is an advance, and then both facets must hold:
  #   anchors_ok     — every scoped element traces to the captured ask (anti-drift verdict, zero drift)
  #   !open_question — no unchecked `- [ ] OPEN QUESTION` remains in the artifact
  # GFR.2 — + the guess-free verdict: the SCOPE content-audit (content-audit skill) must have judged the
  # artifact GUESS_FREE. `contains` (not `==`) because cached_audit stores the full verdict text; `audit.scope`
  # path-resolves the nested `audit` object (buildGuardCtx). Undefined verdict → contains→false → block
  # (FAIL-CLOSED, loop-back until the producer's verdict lands) — a stage never advances on a guessed artifact.
  # GS1: `depth >= 3` removed — research depth is human-paced guidance (procedure), not a machine-enforced gate.
  scope_ready: '!scope.is_advance || (scope.anchors_ok && !scope.open_question && contains(audit.scope, "VERDICT: GUESS_FREE"))'
  # T2.5 — the PLAN gate: a deterministic, zero-LLM predicate over the work-graph. `plan.acyclic` (no cycle in
  # the `blocks`+`parent-child` edges, Kahn) ∧ `plan.complete` (every design element of the INDEPENDENT
  # `extractScope` universe has ≥1 covering issue). Bound by buildGuardCtx; FAIL-CLOSED with no captured scope.
  # GFR.2 — + the guess-free verdict (the PLAN producer, GFR.1b, judged the work-graph GUESS_FREE).
  # GFR.3 — + the ROLLING re-audit clause: re-assert the IMMEDIATELY-PRIOR stage's verdict (SCOPE) still holds.
  # If the scope artifact drifted after its gate passed, editing it re-fires the scope content-audit (the cache is
  # sha256(prompt)-keyed, prompt embeds the artifact → a changed artifact re-evaluates, never a stale pass), so
  # audit.scope flips to UNRESOLVED here and PLAN blocks — drift caught at the NEXT boundary, not only at the end.
  # Only the immediately-prior stage is re-asserted (NOT the full chain): the cascade is transitive across gates.
  plan_ready: 'plan.acyclic && plan.complete && contains(audit.plan, "VERDICT: GUESS_FREE") && contains(audit.scope, "VERDICT: GUESS_FREE")'
  # T2.6 — the AUTHOR gate: a deterministic, zero-LLM predicate over the SHIPPED coverage checker.
  # `author.manifest_complete` (no gated export lacks a covering requirement — `report.orphans.length === 0`) ∧
  # `author.real_code` (every requirement MET — where met for reachable/binding REQUIRES its proof-test to pass,
  # so a stub with no passing proof fails). Bound dual-shape by buildGuardCtx; FAIL-CLOSED on a build error.
  # GFR.2 — + the guess-free verdict (the AUTHOR content-audit judged the task spec GUESS_FREE).
  # GFR.3 — + the ROLLING re-audit clause: re-assert the immediately-prior stage's verdict (PLAN) still holds, so
  # a work-graph that drifted after the PLAN gate (re-mutating it re-fires the plan content-audit) blocks AUTHOR.
  # GFR.4/E2d — + the CONDITIONAL external rung: when the change touches an external fact (`author.external_needed`
  # = diff-derived — a new third-party import / dependency-manifest change, external_dependency.ts), AUTHOR must
  # have a recorded pre-code existing-solution consultation (`author.searched_existing` = the `before` bucket,
  # external_consult.ts). Docs-only / no-new-dependency change → `external_needed` false → the clause passes with
  # NO consult (the user's "only when necessary" — never force it on a trivial edit). REQUIRED, not urged.
  author_ready: 'author.manifest_complete && author.real_code && contains(audit.author, "VERDICT: GUESS_FREE") && contains(audit.plan, "VERDICT: GUESS_FREE") && (!author.external_needed || author.searched_existing)'
  # T2.7 — the CODE gate (inner gate of the `code_cycle` sub_flow): a deterministic, zero-LLM predicate.
  # `code.phases_complete` (the shipped 7-phase ledger `isComplete` for the active task) ∧ `code.readiness_ran`
  # (the three readiness surfacers ran + were recorded) ∧ `code.deprecated_clean` (the recorded readiness found
  # NO known-deprecated call — the BLOCKING result: a deprecated hit BLOCKS, not merely "the surfacer ran").
  # Bound dual-shape by buildGuardCtx; FAIL-CLOSED (never-run readiness / no active task → blocks).
  # GFR.2 — + the guess-free verdict (the CODE producer, GFR.1c, judged the diff GUESS_FREE).
  # GFR.3 — + the ROLLING re-audit clause: re-assert the immediately-prior stage's verdict (AUTHOR) still holds,
  # so a task spec that drifted after the AUTHOR gate (re-editing docs/tasks/T-*.md re-fires the author content-
  # audit) blocks CODE. The CODE producer (GFR.1c) ALSO audits alignment-to-the-task-spec on the diff directly.
  # GFR.4/E2c+E2a — + the CONDITIONAL external rung, same diff-derived predicate (`code.external_needed`): a
  # pre-code doc read (`code.consulted_before` = E2c, the `before` bucket) AND a post-code AUDIT consultation
  # (`code.audited` = E2a, the `after` bucket — a SECOND research run reaching EXTERNAL, recorded only once the
  # `code` phase is logged). Both REQUIRED only when the change touches an external fact; a docs-only /
  # no-new-dependency change is exempt (both clauses pass with no consult). Gate the ACT (a recorded consult),
  # never the QUALITY (was it the primary source) — quality stays advisory (the content-audit, GFR.1/GFR.2).
  code_ready: 'code.phases_complete && code.readiness_ran && code.deprecated_clean && contains(audit.code, "VERDICT: GUESS_FREE") && contains(audit.author, "VERDICT: GUESS_FREE") && (!code.external_needed || code.consulted_before) && (!code.external_needed || code.audited)'
  # T2.8 — the DEPLOY gate: a deterministic, zero-LLM predicate. `deploy.capability_ok` = the shipped
  # CapabilityGate ALLOWS the deploy capability (SKIPPED→true when no deploy env, so a flow with nothing to
  # deploy is not blocked by the gate). The human-accept is the `accept` decision below, not this gate.
  deploy_ready: 'deploy.capability_ok'
  # DBL.1 — the VERIFY decision's predicate: the recorded verification (the configured verifyCommand) passed.
  # FAIL-CLOSED once a verification IS configured (no record → not clean → bug-fix loop); defaults CLEAN when
  # none is configured (skip, mirroring capability_ok) so an unconfigured project ships as today (deploy→accept).
  deploy_clean: 'deploy.clean'
  # DBL.2 — the bug-fix loop has hit its round cap (deploy.bugfix_rounds ≥ MAX) without reaching clean → escalate
  # to the human ACCEPT touchpoint instead of looping to AUTHOR again. Bounds a genuinely-unfixable bug.
  deploy_bugfix_exhausted: 'deploy.bugfix_exhausted'
  # T2.8 — the DURABLE human-acceptance signal (`deploy.accepted` = the active task's acceptance item is
  # `accepted`, acceptance.ts — survives a closed session, re-surfaces at start-up). UNACCEPTED/absent → the
  # accept decision's `else` branch fires → DEPLOY loops back to PLAN (NEVER auto-declare "shipped").
  accepted: 'deploy.accepted'
  # REVERSIBLE-DEPLOY — `deploy.reversible` = the project's `.opensquid/active.json` declares `reversible: true`.
  # When true, the `accept` decision auto-advances (no human gate needed — a reversible deploy can be undone).
  # FAIL-CLOSED: absent/false → irreversible → the `else` branch holds → human must accept.
  deploy_reversible: 'deploy.reversible'
  # FD5/FD6 — the FRONTEND pre-delivery predicate: a deterministic, zero-LLM check over the OUTPUT enforcement.
  # `frontend.clean` = the STAGED frontend files carry NO CRITICAL accessibility defect (frontend_audit:
  # img-no-alt, keyboard-dead onClick). FAIL-OPEN (frontend_evidence.ts) — a non-frontend / non-repo / unanalyzable
  # commit is clean:true. NOTE: currently UNWIRED — its evaluator (the bespoke v2_enforce PreToolUse hook) was
  # removed as drift and NO FSM state references this guard. Re-wiring via the canonical commit-gate is deferred to
  # the frontend slice (build order: frontend last). Retained as the predicate the frontend slice will bind.
  code_frontend_clean: 'frontend.clean'
  # GS1 — the SCOPE_WRITE gate: fires on a pre-research artifact Write/Edit that is anchors_ok ∧ !open_question ∧
  # GUESS_FREE. No short-circuit (unlike scope_ready): scope_write is an AUTOMATED stage with one job — write the
  # artifact — so every non-advance post_tool_call blocks until the artifact lands correctly.
  scope_write_ready: 'scope.is_advance && scope.anchors_ok && !scope.open_question && contains(audit.scope, "VERDICT: GUESS_FREE")'

fsm:
  initial: scope
  states:
    # ── SCOPE (interactive — a NO-OP RESTING STATE) ─────────────────────────
    # SCOPE is the ONE interactive stage (procedure/scope.md): the human + agent research and talk. The automated
    # FSM does NOTHING here. It has NO `trigger`, so the observed actor DWELLS on every hook event
    # (v2_observed_actor.ts:68 returns [] when the event is not in a gate's trigger) — a `recall`/`Read`/`Grep`,
    # even the pre-research artifact write, NEVER advances it. Per the user (2026-07-05): "scope does nothing until
    # it is scope_write", and "automation starts when the user says scope is done." The ONLY thing that leaves
    # SCOPE is the human's explicit confirmation, which ends the interactive turn and starts the automated lap that
    # boots directly at `scope_write` (v2_supply.ts:616-623). So `scoped → scope_write` is a STRUCTURAL transition,
    # not one a tool event fires: nothing an agent does in the session leaves SCOPE — only the user's say-so does.
    #
    # The prior `trigger: [post_tool_call]` was the bug: it made SCOPE evaluate on every tool call and auto-advance
    # on the first one (`!scope.is_advance` passing), so the interactive stage never actually ran. Removed.
    scope:
      kind: gate
      guard: scope_ready
      on_pass_emits: scoped
      # guard / on_fail are INERT in the interactive observed path (no trigger ⇒ never evaluated); retained only so
      # the `scope → scope_write` transition stays structurally defined for the compiler / validateFsm.
      on_fail: { action: block, message: 'SCOPE: anchors∧!open_question' }
      report: SCOPE
      reads:
        - scope.anchors_ok
        - { key: scope.open_question, label: 'no open question', expect: false }
      writes: ['docs/research/*pre-research*']
    # ── SCOPE_WRITE (GS1 — automated: write the pre-research artifact + trigger decompose) ────────────────────
    scope_write:
      kind: gate
      guard: scope_write_ready
      trigger: [post_tool_call]
      on_pass_emits: scope_written
      on_fail: { action: block, message: 'SCOPE_WRITE: write the scope artifact — anchors_ok ∧ !open_question ∧ GUESS_FREE' }
      # CADENCE — after-stage report on LEAVE (scope_write → plan) + before-stage summary on ENTRY (scope → scope_write).
      report: SCOPE_WRITE
      summary: true
      # EVIDENCE-DECLARATION — same facets as SCOPE (scope_evidence.ts computes them for any pre-research write).
      reads:
        - scope.anchors_ok
        - { key: scope.open_question, label: 'no open question', expect: false }
      # STAGE-WORK — the "Will:"/"Next →" text (was NEXT_STAGE_WORK['scope_write'] in core, now pack data).
      does: 'write the pre-research artifact for the scoped task (anchors resolved, guess-free)'
      # Same artifact lane as SCOPE — this automated stage's one job is to land the pre-research artifact.
      writes: ['docs/research/*pre-research*']
    # ── PLAN (new top-level region vs v1) ──────────────────────────────────
    plan:
      kind: gate
      guard: plan_ready
      trigger: [post_tool_call]
      on_pass_emits: planned
      on_fail: { action: block, message: 'PLAN: acyclic∧complete' }
      # CADENCE — after-stage report on LEAVE (plan → author) + before-stage summary on ENTRY.
      report: PLAN
      summary: true
      # EVIDENCE-DECLARATION — the work-graph facets the PLAN report proves (was core stageEvidence['plan']).
      reads:
        - plan.acyclic
        - plan.complete
      # STAGE-WORK — was NEXT_STAGE_WORK['plan'] in core, now pack data.
      does: 'decompose the scope into a dependency-ordered, acyclic plan'
      # LANE MODEL — PLAN decomposes into the work-graph (via MCP `workgraph_*` tools, which are not
      # file-writes and so are never lane-checked) and may write only docs (plan notes/reports). A source-file
      # write during PLAN is out of lane → blocked (planning does not implement).
      writes: ['docs/**']
    # ── AUTHOR (T2.6 — the ENFORCING coverage gate) ────────────────────────
    author:
      kind: gate
      guard: author_ready
      trigger: [post_tool_call]
      on_pass_emits: authored
      on_fail: { action: block, message: 'AUTHOR: manifest_complete∧real_code' }
      # CADENCE — after-stage report on LEAVE (author → code) + before-stage summary on ENTRY (also re-fires when
      # the VERIFY bug-fix loop re-enters author).
      report: AUTHOR
      summary: true
      # EVIDENCE-DECLARATION — the coverage facets the AUTHOR report proves (was core stageEvidence['author']).
      reads:
        - author.manifest_complete
        - author.real_code
      # STAGE-WORK — was NEXT_STAGE_WORK['author'] in core, now pack data.
      does: 'author the spec + real code covering every scoped element'
      # LANE MODEL — AUTHOR writes the task spec + requirement manifest (docs), not the implementation. A
      # source-file write during AUTHOR is out of lane → blocked (the code belongs to the CODE stage).
      writes: ['docs/**']
    # ── CODE (T2.7 — ENFORCING gate on the live OBSERVED path) ──────────────
    # A `sub_flow` is INERT in observed mode (V2ObservedActor advances only at gate/decision,
    # v2_observed_actor.ts:74) → it would PARK the live flow at CODE and never reach DEPLOY. So the live observed
    # path uses a GATE here (traverses code→deploy). The `flows.code_cycle` sub_flow is RETAINED below (it
    # exercises the sub_flow KIND + compiles/validates) as the §5-DEFERRED driven per-task region — same
    # reconciliation as the executor kind + loopback flow: defined for the driven model, NOT on the live path.
    code:
      kind: gate
      guard: code_ready
      trigger: [post_tool_call]
      on_pass_emits: coded
      on_fail: { action: block, message: 'CODE: log all 7 phases + readiness clean' }
      # CADENCE — after-stage report on LEAVE (code → deploy) + before-stage summary on ENTRY (author → code). The
      # CODE after-report is the long, stand-out one (7-phase chart); under automation loop_driver owns it, so
      # v2_supply suppresses the CODE report (not the summary) under OPENSQUID_AUTOMATION=1 (unchanged double-emit guard).
      report: CODE
      summary: true
      # EVIDENCE-DECLARATION — the CODE gate facets the report proves (was core stageEvidence['code']).
      reads:
        - code.phases_complete
        - code.readiness_ran
        - code.deprecated_clean
      # STAGE-WORK — was NEXT_STAGE_WORK['code'] in core, now pack data.
      does: 'run the 7-phase coding cycle: pre_research → learn → code → test → audit → post_research → fix'
      # LANE MODEL — CODE is the implementation stage: it writes source, tests, and configs. Its lane is
      # intentionally UNRESTRICTED (`**` matches every path) — declared explicitly (not omitted) so the pack
      # documents that CODE's freedom is a decision, not an oversight. Enforcement here is the completeness
      # gate (7 phases + readiness), not the lane.
      writes: ['**']
    # ── DEPLOY (T2.8 — the ENFORCING capability gate) ──────────────────────
    deploy:
      kind: gate
      guard: deploy_ready
      trigger: [post_tool_call]
      on_pass_emits: deployed
      on_fail: { action: block, message: 'DEPLOY: capability gate' }
      # CADENCE — after-stage report on LEAVE (deploy → verify) + before-stage summary on ENTRY (code → deploy).
      report: DEPLOY
      summary: true
      # EVIDENCE-DECLARATION — the facets the DEPLOY report proves (was core stageEvidence['deploy']).
      reads:
        - deploy.capability_ok
        - deploy.reversible
      # STAGE-WORK — was NEXT_STAGE_WORK['deploy'] in core, now pack data.
      does: 'verify deploy capability, then the human-accept gate'
      # LANE MODEL — DEPLOY runs verification + release steps that may touch varied paths; its lane is
      # UNRESTRICTED (`**`), declared explicitly for the same documentation reason as CODE.
      writes: ['**']
    # ── VERIFY (DBL.1 — the bug-fix fork: deploy delegates bugs back to AUTHOR) ─────────────────────────────
    # After DEPLOY's capability gate, a DECISION over `deploy_clean` (the recorded verification result): clean →
    # ACCEPT (the human touchpoint); bugs → AUTHOR (re-spec the fix as task(s) → code → deploy → re-verify),
    # looping until deployable. DISTINCT from accept→rejected→plan (a SCOPE rejection); this is the BUG loop.
    # `deploy_clean` defaults CLEAN when no verification is configured (skip, mirroring capability_ok) — until
    # DBL.1b wires the deterministic verify-record, this preserves today's deploy→accept exactly.
    verify:
      kind: decision
      branches:
        - { guard: deploy_clean, emits: verified } # verification passed → ACCEPT
        # DBL.2 — BOUND the loop: too many bug-fix rounds without reaching clean → escalate to the human (ACCEPT
        # touchpoint), never an infinite deploy→author grind. Checked AFTER clean (a now-clean item ships
        # regardless of past rounds) and BEFORE bugs_found (so the cap actually stops the loop).
        - { guard: deploy_bugfix_exhausted, emits: bugfix_exhausted } # cap hit → human review
        - { else: true, emits: bugs_found } # bugs, under cap → AUTHOR (the bug-fix loop; never ship broken)
    # ── acceptance (the second/last human touchpoint) ──────────────────────
    accept:
      kind: decision
      branches:
        - { guard: accepted, emits: accepted } # human said yes → ship
        # REVERSIBLE-DEPLOY: a reversible deploy auto-advances without a human gate (can be undone). The
        # acceptance audit item is still created (trail preserved). Checked AFTER `accepted` so an explicit
        # human accept also works; BEFORE `else` so the human gate still holds for irreversible deploys.
        # Uses a DISTINCT event `auto_accepted` (not `accepted`) so the FSM compiler's distinct-emits
        # constraint is satisfied; both events route to `done`.
        - { guard: deploy_reversible, emits: auto_accepted } # reversible → auto-ship (no human gate)
        - { else: true, emits: rejected } # default / no signal → loop back to PLAN (never auto-ship)
    # ── terminal ───────────────────────────────────────────────────────────
    done:
      kind: terminal
      outcome: shipped
  transitions:
    - { from: scope, on: scoped, to: scope_write }
    - { from: scope_write, on: scope_written, to: plan }
    - { from: plan, on: planned, to: author }
    - { from: author, on: authored, to: code }
    - { from: code, on: coded, to: deploy }
    - { from: deploy, on: deployed, to: verify } # DBL.1 — through VERIFY (was: straight to accept)
    - { from: verify, on: verified, to: accept } # clean → the human-accept touchpoint
    - { from: verify, on: bugs_found, to: author } # bugs → re-author the fix (the bug-fix loop)
    - { from: verify, on: bugfix_exhausted, to: accept } # DBL.2 — cap hit → human review (bounded, never infinite)
    - { from: accept, on: accepted, to: done }
    - { from: accept, on: auto_accepted, to: done } # REVERSIBLE-DEPLOY: distinct event, same target as accepted
    - { from: accept, on: rejected, to: plan }

# HAR.1 registry of isolated nested machines (compile_v2.ts:160 — a `sub_flow.flow` is a key into this).
flows:
  # T2.7 — the per-task CODE region: the agent logs all 7 phases + runs the readiness surfacers, then the
  # ENFORCING `code_ready` gate passes (→ committed/terminal `coded`) or BLOCKS on the RESULT (incomplete phases,
  # never-run readiness, or a deprecated-syntax hit). One isolated machine per task (principle 9).
  code_cycle:
    initial: coding
    states:
      coding:
        kind: gate
        guard: code_ready
        trigger: [post_tool_call]
        on_pass_emits: committed
        on_fail: { action: block, message: 'CODE: log all 7 phases + readiness clean' }
      committed:
        kind: terminal
        outcome: shipped
    transitions:
      - { from: coding, on: committed, to: committed }
