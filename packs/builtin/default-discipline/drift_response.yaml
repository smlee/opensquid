# default-discipline drift response policy.
#
# Default per project_opensquid_drift_response_is_pack_declared:
# `full_stop_and_redo` — halt the entire task, restart from the user's
# defined workflow. Per-rule overrides downshift to softer policies where
# the legacy rule was a `severity: warn` (honesty-ledger) or where a
# softer response is appropriate (substrate-purity).
#
# FC.1b (2026-06-03): the git / engine-vocab / versioning / honesty-ledger /
# phase-logging rules are now compiled guards, so their rule ids are
# `guard:<name>` (the `default-discipline/guards` synthetic skill). Keys are
# quoted because of the embedded colon. The two `workflow` keys below are
# UNCHANGED — that skill was not migrated.
default: full_stop_and_redo
per_rule:
  # Git hygiene — block the one tool call, don't halt the whole task.
  'guard:never-amend': block_tool
  'guard:no-force-push-main': block_tool

  # Substrate-purity is a soft warn (engine-side smell, not a stop signal).
  'guard:substrate-purity': warn

  # Version slot assignment is loud — pause for user input.
  'guard:version-slot-assignment': notify_and_pause

  # Honesty-ledger claim rules — all warn, never block.
  'guard:research-start': warn
  'guard:research-spawning': warn
  'guard:starting-now': warn
  'guard:running-tests': warn
  'guard:running-build': warn
  'guard:committed': warn
  'guard:telegram-sent': warn
  'guard:pushed': warn
  'guard:tagged': warn
  'guard:fmt-clippy': warn
  'guard:phase-logged': warn
  'guard:audit-done': warn
  'guard:pre-push-checklist': warn
  'guard:ci-verify-after-push': warn

  # Phase-logging claim gates — warn.
  'guard:phase-claim-forward': warn
  'guard:session-no-task': warn

  # Versioning hard-stop (migrated guard).
  'guard:versioning-pre1-patch-only': full_stop_and_redo

  # Workflow hard-stops — NOT migrated (workflow skill keeps bare rule ids).
  workflow-phases-required: full_stop_and_redo
  phase-logged-before-commit: full_stop_and_redo

  # verify-before-claiming — evidence-or-flag prerequisite. Warn, never halt:
  # a Stop-event flag, not a pre-emission block (bare skill rule id).
  claim-without-evidence: warn
