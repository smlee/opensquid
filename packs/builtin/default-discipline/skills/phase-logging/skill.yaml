# phase-logging — three claim rules that gate on opensquid-internal tools.
#
# Ports lines 253–287 of bundled-default/pack.yaml:
#   - version-slot-assignment (announces minor/major bump → notify_and_pause)
#   - phase-claim-forward (announces "Phase N — phase_name" → expect log_phase)
#   - session-no-task (announces "I'll execute" → expect TaskCreate/Update)
#
# These three live in their own skill because they gate on
# opensquid-internal tool calls (mcp__opensquid__log_phase,
# TaskCreate/TaskUpdate, AskUserQuestion) rather than on shell commands.
# Drift response policy per drift_response.yaml.
#
# T-RESPONSE-JUDGING-UPS RJ.2 (2026-06-01): these are response-judging gates —
# they inspect the assistant's just-emitted prose for a claim. Per the lexicon
# law, such gates run at UserPromptSubmit (where the prior turn is SETTLED — no
# off-by-one), NOT Stop. They detect the claim via `text_pattern_match` on the
# `priorAssistantText` event field (RJ.1). The prior `last_assistant_message` +
# `match_command target: tool_args.msg` composition NEVER fired: the trigger
# defaulted to tool_call (where last_assistant_message is null) and match_command
# only runs on tool_call AND reads event.args, not the binding.
name: phase-logging
load: preload
when_to_load: []
triggers:
  - kind: prompt_submit
rules:
  - id: version-slot-assignment
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns:
            - '\b(?:next\s+minor|next\s+major|bump(?:ing)?\s+(?:to\s+)?(?:minor|major)|ships?\s+as\s+v?[0-9]+\.[0-9]+\.[0-9]+)\b'
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args:
          level: warn
          message: >-
            ASK the user before naming a non-patch version slot
            (call AskUserQuestion); never pick v0.8/v0.9/v1.0
            unilaterally.

  - id: phase-claim-forward
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns:
            - '\bPhase\s+[1-7](?:\s*\/\s*7)?\s*[—\-:]\s*(?:pre[_-]?research|learn|code|test|audit|post[_-]?research|fix)\b'
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args:
          level: warn
          message: >-
            call mcp__opensquid__log_phase for the phase you announced

  - id: session-no-task
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns:
            - "\\b(?:let\\s+me\\s+(?:run|execute|implement|fix|build|wire)|now\\s+i'?ll\\s+(?:run|implement|fix|build|wire))\\b"
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args:
          level: warn
          message: >-
            create or update a task (TaskCreate/TaskUpdate) before doing
            substantive work — keeps the workflow-gate enforceable
prose: |
  Phase-logging discipline. Three claim gates that the agent should
  back with a structured tool call rather than a free-text assertion:
  version-slot allocation, phase announcement, and session-task
  creation. All warn-level — the agent learns to swap free-text for
  the right tool call.
