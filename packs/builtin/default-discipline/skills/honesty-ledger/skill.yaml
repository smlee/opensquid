# honesty-ledger — 14 claim rules (12 legacy + pre-push-checklist + ci-verify-after-push).
# Each emits a `warn` verdict when the assistant makes a claim. Evidence-tracker
# primitive is a follow-up; PERS.2 ships pattern-detection so legacy coverage is preserved.
# Each rule pulls the assistant's message via last_assistant_message then match_command.
name: honesty-ledger
load: preload
when_to_load: []
rules:
  - id: research-start
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args:
          { pattern: '\b(pre-?research|research)\s+(starting|begins?)\b', target: tool_args.msg }
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: spawn a research agent or do explicit reading }
  - id: research-spawning
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args:
          { pattern: '\bspawn(?:ing)?\s+(?:a\s+)?(?:research\s+)?agent\b', target: tool_args.msg }
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: spawn a research agent }
  - id: starting-now
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args: { pattern: '\b(?:starting|kicking off)\s+(?:#?\w+\s+)?now\b', target: tool_args.msg }
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: actually start the work (any tool call counts) }
  - id: running-tests
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args:
          pattern: '\brunning\s+(?:the\s+)?tests?\b|\btests?\s+pass(?:ing|ed|es)?\b'
          target: tool_args.msg
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: run npm test / cargo test }
  - id: running-build
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args:
          pattern: '\brunning\s+(?:the\s+)?build\b|\bbuild\s+(?:pass(?:ing|es|ed)?|clean|green)\b'
          target: tool_args.msg
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: run the build }
  - id: committed
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args: { pattern: '\b(?:committed|just committed|committing)\b', target: tool_args.msg }
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: git commit }
  - id: audit-done
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args:
          pattern: '\b(?:audit\s+(?:done|complete)|Phase\s+\d+\s*[—-]\s*Audit)\b'
          target: tool_args.msg
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: do the audit (any inspection tool call) }
  - id: telegram-sent
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args:
          pattern: '\b(?:telegram(?:\s+(?:report|message))?\s+(?:sent|delivered)|sent\s+(?:to|via)\s+telegram|pinged\s+(?:you|telegram))\b'
          target: tool_args.msg
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: call the telegram reply tool or chat_send }
  - id: pushed
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args:
          pattern: '\b(?:pushed|pushing)\s+(?:to\s+(?:origin|main|remote|github)|it|up|the\s+(?:commit|tag|fix|changes?|branch|release|PR|update))\b'
          target: tool_args.msg
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: git push origin <branch> }
  - id: tagged
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args:
          pattern: '\b(?:just\s+)?tagged\s+v?\d+\.\d+(?:\.\d+)?\b|\bcreated\s+(?:the\s+|a\s+)?tag\s+v?\d+\.\d+\b'
          target: tool_args.msg
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: git tag <name> }
  - id: fmt-clippy
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args:
          pattern: '\b(?:fmt|clippy|prettier|formatting)\s+(?:clean|passes?|passing|green|ok)\b'
          target: tool_args.msg
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: run cargo fmt / cargo clippy / prettier / npm run format }
  - id: phase-logged
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args:
          pattern: '\b(?:logged|logging)\s+(?:the\s+)?(?:audit|post[_-]?research|fix|test|code|learn|pre[_-]?research)\s+phase\b'
          target: tool_args.msg
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: call mcp__opensquid__log_phase }
  - id: pre-push-checklist
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args:
          pattern: '\b(?:ready\s+to\s+push|gates\s+green|pre-push\s+(?:clean|done))\b'
          target: tool_args.msg
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: run typecheck + prettier + test + build before pushing }
  - id: ci-verify-after-push
    process:
      - { call: last_assistant_message, as: msg }
      - call: match_command
        args:
          pattern: '\b(?:CI\s+green|CI\s+passing|workflow\s+passed)\b'
          target: tool_args.msg
        as: claimed
      - call: verdict
        if: claimed
        args: { level: warn, message: verify via `gh run watch <id>` before claiming CI green }
prose: |
  Honesty-ledger catalog. Each rule maps a claim pattern in the assistant's
  message to a warn verdict. The evidence-tracker primitive (follow-up) will
  gate verdicts on subsequent tool calls — for now every match warns, which
  preserves legacy pattern coverage.
