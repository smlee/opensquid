# honesty-ledger — 14 claim rules (12 legacy + pre-push-checklist + ci-verify-after-push).
# Each emits a `warn` verdict when the assistant makes a claim.
#
# T-RESPONSE-JUDGING-UPS RJ.2 (2026-06-01): these are response-judging gates —
# they inspect the assistant's just-emitted prose for an unbacked claim ("running
# tests", "committed", "pushed"). Per the lexicon law they run at UserPromptSubmit
# (where the prior turn is SETTLED — no off-by-one), NOT Stop, and detect the claim
# via `text_pattern_match` on the `priorAssistantText` event field (RJ.1). The prior
# `last_assistant_message` + `match_command target: tool_args.msg` composition NEVER
# fired: trigger defaulted to tool_call (last_assistant_message → null there) and
# match_command only runs on tool_call AND reads event.args, not the `msg` binding.
name: honesty-ledger
load: preload
when_to_load: []
triggers:
  - kind: prompt_submit
rules:
  - id: research-start
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns: ['\b(?:pre-?research|research)\s+(starting|begins?)\b']
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: spawn a research agent or do explicit reading }
  - id: research-spawning
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns: ['\bspawn(?:ing)?\s+(?:a\s+)?(?:research\s+)?agent\b']
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: spawn a research agent }
  - id: starting-now
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns: ['\b(?:starting|kicking off)\s+(?:#?\w+\s+)?now\b']
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: actually start the work (any tool call counts) }
  - id: running-tests
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns: ['\brunning\s+(?:the\s+)?tests?\b|\btests?\s+pass(?:ing|ed|es)?\b']
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: run npm test / cargo test }
  - id: running-build
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns:
            ['\brunning\s+(?:the\s+)?build\b|\bbuild\s+(?:pass(?:ing|es|ed)?|clean|green)\b']
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: run the build }
  - id: committed
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns: ['\b(?:committed|just committed|committing)\b']
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: git commit }
  - id: audit-done
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns: ['\b(?:audit\s+(?:done|complete)|Phase\s+\d+\s*[—-]\s*Audit)\b']
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: do the audit (any inspection tool call) }
  - id: telegram-sent
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns:
            - '\b(?:telegram(?:\s+(?:report|message))?\s+(?:sent|delivered)|sent\s+(?:to|via)\s+telegram|pinged\s+(?:you|telegram))\b'
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: call the telegram reply tool or chat_send }
  - id: pushed
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns:
            - '\b(?:pushed|pushing)\s+(?:to\s+(?:origin|main|remote|github)|it|up|the\s+(?:commit|tag|fix|changes?|branch|release|PR|update))\b'
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: git push origin <branch> }
  - id: tagged
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns:
            - '\b(?:just\s+)?tagged\s+v?\d+\.\d+(?:\.\d+)?\b|\bcreated\s+(?:the\s+|a\s+)?tag\s+v?\d+\.\d+\b'
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: git tag <name> }
  - id: fmt-clippy
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns: ['\b(?:fmt|clippy|prettier|formatting)\s+(?:clean|passes?|passing|green|ok)\b']
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: run cargo fmt / cargo clippy / prettier / npm run format }
  - id: phase-logged
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns:
            - '\b(?:logged|logging)\s+(?:the\s+)?(?:audit|post[_-]?research|fix|test|code|learn|pre[_-]?research)\s+phase\b'
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: call mcp__opensquid__log_phase }
  - id: pre-push-checklist
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns: ['\b(?:ready\s+to\s+push|gates\s+green|pre-push\s+(?:clean|done))\b']
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args: { level: warn, message: run typecheck + prettier + test + build before pushing }
  - id: ci-verify-after-push
    process:
      - call: text_pattern_match
        args:
          text_field: 'priorAssistantText'
          patterns: ['\b(?:CI\s+green|CI\s+passing|workflow\s+passed)\b']
        as: claimed
      - call: verdict
        if: 'len(claimed.matched) > 0'
        args:
          {
            level: warn,
            message: verify CI via `gh run view <id> --json conclusion` (NOT `gh run watch`) before claiming CI green,
          }
prose: |
  Honesty-ledger catalog. Each rule maps a claim pattern in the assistant's
  message to a warn verdict. Matching runs at UserPromptSubmit against the
  settled prior assistant turn (priorAssistantText). The evidence-tracker
  primitive (follow-up) will gate verdicts on subsequent tool calls — for now
  every match warns, which preserves legacy pattern coverage.
