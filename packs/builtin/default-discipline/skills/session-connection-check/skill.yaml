# session-connection-check — T-HANDOFF-HARDENING HH6.2.
#
# The first consumer of the SessionStart hook mechanism (HH6.1). On session
# begin it surfaces the project's chat-connection state (telegram configured +
# whether `chat watch` is running, or a wizard nudge if nothing is wired) plus
# a generic umbrella-routing-drift warning, as an inject_context that the
# SessionStart hook bin emits via hookSpecificOutput.additionalContext.
#
# REPORT-ONLY (per project_opensquid_no_agent_loop): the primitive reads state
# and composes a message; it never starts chat watch, spawns a daemon, or
# repairs routing. The agent reads the surfaced report and acts.
#
# Opt-out: set `chat.session_start_check: "off"` in ~/.opensquid/config.json
# and check_chat_connection returns null (no injection).
#
# unloads_when: session_ends — scoped to one session begin; the event only
# fires once per session anyway, but this keeps it off the long-running
# dynamic-skill set.
name: session-connection-check
load: lazy
when_to_load:
  - kind: event_type
    type: session_start
unloads_when:
  - kind: session_ends
triggers:
  - kind: session_start
rules:
  # T-SESSION-STATUS-MANIFEST — ONE consolidated "what opensquid is connected to"
  # report (chat + flow + packs + daemon + engine), always shown on session begin.
  # Supersedes the old single-section check_chat_connection call (which stays a
  # registered primitive, now unwired). Returns inject_context directly (terminal).
  - id: surface-connection-state
    kind: track_check
    process:
      - call: session_status_manifest
  # T-AUTO-HANDOFF — reader + tier-3 lazy generator: surfaces the previous
  # (dead) session's auto-handover doc, GENERATING it from disk first when the
  # dead session died without a handoff (kill-9/wedge safe via the FU.3
  # pointer). One injection per fresh session; fail-quiet.
  - id: surface-auto-handoff
    kind: track_check
    process:
      - call: handoff_session_start
  # CAT.7 — SessionStart topic assurance (umbrella-level ≤1 topic). Unlike the
  # report-only rule above, this one takes an ACTION (sanctioned by the
  # remote-terminal override): if a chat daemon is live and the session's
  # umbrella owns a telegram chat_id but ZERO topic, it creates exactly one
  # topic and writes topic_id back into channels.json. Idempotent: once set
  # it's a no-op. Always returns null (pure side effect — no inject_context),
  # so it never short-circuits the rule above and fail-quiets on any error.
  - id: ensure-umbrella-topic
    kind: track_check
    process:
      - call: ensure_umbrella_topic
