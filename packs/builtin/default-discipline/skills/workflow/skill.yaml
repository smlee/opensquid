# workflow — the locked 7-phase workflow.
#
# Ports the legacy `standard-7-phase` workflow + `phase-logged-7-phase`
# policy from bundled-default/pack.yaml lines 97–145, 308–313.
#
# Two rules:
#   - workflow-phases-required (destination_check): periodic LLM judgement
#     on whether the active task is skipping phases.
#   - phase-logged-before-commit (track_check): refuse `git commit` until
#     all 7 phases are logged via `mcp__opensquid__log_phase`.
#
# Load: preload — workflow discipline is always-on per
# project_opensquid_pack_load_hybrid.
name: workflow
load: preload
when_to_load: []
rules:
  - id: workflow-phases-required
    kind: destination_check
    interval:
      every_n_tool_calls: 10
    model_alias: reasoning
    prompt_template: |
      The locked 7-phase workflow is:
        pre_research → learn → code → test → audit → post_research → fix

      Inspect the active task's recent activity. Has the agent skipped or
      short-circuited any phase before reaching a terminal action
      (commit, push, tag)?

      Reply with one of:
        DRIFTING  <one-line reason>
        ON_TRACK  <one-line reason>

  - id: phase-logged-before-commit
    process:
      # T-GATE-MATCHER-SUBSTRING (GM.3, wg-52e57e2ed252): was a raw-string regex over the whole
      # command (boundary-anchored, but still matched `; git commit` inside a quoted echo/prompt).
      # `command_invokes` parses real shell segments → matches only a genuine `git commit`
      # invocation (compounds like `cd … && git commit` still match).
      - call: command_invokes
        args:
          program: git
          subcommand: commit
        as: committing
      - call: read_state
        if: committing
        args:
          key: workflow.phases_logged
        as: phases
      # Docs-only parity (wg-3dcca3b29ed1): consult the STAGED diff the way the
      # git-owned hard gate (gate.ts isDocsOnly) does, so the nudge mirrors the
      # boundary instead of over-blocking a docs-only commit. The step runs only
      # when committing; `staged_docs_only` fails toward `false` (= not docs-only
      # = block stands) on any git error.
      - call: staged_docs_only
        if: committing
        as: docs_only
      # FU.9: `read_state` returns the ledger OBJECT `{task_id, phases:[...]}`,
      # never the string "complete" — the prior `phases != "complete"` was always
      # true (object !== string), so paired with the old exit-0 halt stub the gate
      # silently no-op'd. Block when fewer than all 7 phases are logged AND the
      # staged diff is not docs-only. `len` returns 0 for a null/absent ledger →
      # 0 < 7 → blocks a zero-phase code commit; `!docs_only` lets docs-only pass.
      - call: verdict
        if: 'committing && len(phases.phases) < 7 && !docs_only'
        args:
          level: block
          message: >-
            BLOCKED: 7-phase workflow incomplete. Log each phase via
            `mcp__opensquid__log_phase` (pre_research → learn → code →
            test → audit → post_research → fix) before committing.
prose: |
  The locked 7-phase workflow per feedback_workflow_cycle (PRIMARY
  drift-protection rule). Every substantive task runs all 7 phases
  before a terminal action. The destination_check is the soft side
  (periodic LLM judgement); the track_check gates `git commit` on a
  state key that the runtime updates each time `log_phase` fires.
