# git — Sangmin's git hygiene rules.
#
# Two drift gates (never-amend / no-force-push-main). Each fires when the host
# invokes Bash with a matching command. Drift response is `block_tool` per
# drift_response.yaml — refuse the one tool call rather than halting the whole
# task.
#
# NOTE (2026-06-01): `no-implicit-push` was REMOVED — it is NOT the user's rule.
# The user's standing policy is "git push is pre-authorized" (force-push /
# branch-deletion still need OK — that's `no-force-push-main`). no-implicit-push
# was a TEMPORARY guard during a versioning mess and is now obsolete.
name: git
load: lazy
when_to_load:
  - tool_match: Bash
rules:
  - id: never-amend
    process:
      - call: match_command
        args:
          pattern: '(?:^|[;&|\n(])\s*git\s+(?:-[cC]\s+\S+\s+)*commit\b[^\n]*\s--amend\b' # FU.14: command-boundary (catches `cd … && git commit --amend`)
          target: tool_args.command
        as: hit
      - call: verdict
        if: hit
        args:
          level: block
          message: >-
            BLOCKED: `git commit --amend` violates the never-amend rule.
            Even on unpushed commits — make a follow-up commit instead.
            Override only if the user explicitly requested an amend in
            THIS turn.

  - id: no-force-push-main
    process:
      - call: match_command
        args:
          pattern: '(?:^|[;&|\n(])\s*git\s+(?:-[cC]\s+\S+\s+)*push\b[^\n]*(--force|-f)\b[^\n]*\b(main|master)\b' # FU.14: command-boundary
          target: tool_args.command
        as: hit
      - call: verdict
        if: hit
        args:
          level: block
          message: >-
            BLOCKED: force-push to main/master is destructive. Requires
            explicit user request — and even then, prefer a regular push
            or a new branch.
prose: |
  Git hygiene rules. The three blocks above are the locked floor; the
  user can override on a per-command basis when they have a genuine
  reason (e.g. a pre-authorized push).
