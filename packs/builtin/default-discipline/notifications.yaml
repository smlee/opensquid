# default-discipline notification routing.
#
# Minimal defaults that compose with the schema defaults: critical + error
# go to `alerts`; warning + info go to `chat`. Users can override per-project
# in their user-scope pack (e.g. route engine-repo `warning` to a dedicated
# Telegram topic).
severity_tiers:
  critical: [alerts]
  error: [alerts]
  warning: [chat]
  info: [chat]
per_project_override: {}
