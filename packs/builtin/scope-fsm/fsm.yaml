# scope-fsm lifecycle — the explicit total-transition machine the gate reads.
#
# scoping ──research_done──> researched ──build──> building
# researching ──research_done──> researched
# researched ──guess_found──> researching   (the capable-model audit found an
#   unresolved guess → loop back to research; chain_state could never do this)
initial: scoping
states: [scoping, researching, researched, building]
transitions:
  - { from: scoping, on: research_done, to: researched }
  - { from: researching, on: research_done, to: researched }
  - { from: researched, on: guess_found, to: researching }
  - { from: researched, on: build, to: building }
