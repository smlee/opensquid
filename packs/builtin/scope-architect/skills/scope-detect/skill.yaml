# scope-detect — soft prompt-intent warn that fires on scope-authoring intent.
# Extracted from user-pack scope-decomposer rule `scope-intent-nudge` (DPC.1).
name: scope-detect
load: preload
when_to_load:
  - kind: event_type
    type: prompt_submit
triggers:
  - kind: prompt_submit
rules:
  - id: scope-intent-nudge
    process:
      - call: text_pattern_match
        args:
          text_field: prompt
          patterns:
            # Original scope-decomposer patterns (user-pack source):
            - '\bspec(?:c?ing|ced)?\s+(?:out|this|the)\b'
            - '\bscope\s+(?:out|this|the|a)\b'
            - '\bnew\s+(?:task|track)\b'
            - '\badd\s+(?:a\s+|another\s+)?(?:task|track)\b'
            - '\bdesign\s+(?:a|the|this)\b'
            - '\bplan\s+(?:out|a|the)\b'
            # DPC.2 (2026-05-30) — bulk-action patterns from drift transcripts.
            # Today's session proved these prompts bypassed the original 6
            # patterns ("audit and add a proper solution", "refactor based on
            # it all", "close the gaps based your understanding").
            - '\baudit\s+(?:memory|skills|tasks|gaps|coverage|drift|the\s+\w+)\b'
            - '\b(?:close|fix|address|propose|build|ship)\s+(?:the\s+)?(?:gaps?|drift|items|todos|skills|gates)\b'
            - '\bproper\s+solution\b'
            - '\b(?:list|batch)\s+of\s+(?:tasks|todos|items|skills|gates|issues|memories|gaps|drifts?)\b'
            - '\brefactor\b'
            - '\bbased\s+(?:on\s+)?(?:your|the)\s+(?:understanding|picture|synthesis|integration)\b'
        as: intent
      - call: verdict
        if: 'len(intent.matched) > 0'
        args:
          level: warn
          message: >-
            Scope-authoring intent detected. Before writing ANY task / track /
            spec: (1) run pre-research → docs/research/<slug>-pre-research-<date>.md;
            (2) invoke the `task-spec-author` profession (next_action.profession);
            (3) verify all 11 fields. Do NOT inline-spec in TASKS.md or
            docs/tasks/. opensquid emits this directive; YOU run the steps.
prose: |
  The SOFT side of the scope-authoring gate. Fires on prompt_submit when
  the user's message shows scope-authoring intent. The HARD side
  (inline-spec-block) blocks the actual Write/Edit when a spec lands with no
  pre-research artifact. DPC.2 widens this skill's regex patterns to cover
  bulk-action prompts; this initial DPC.1 version preserves the original
  user-pack patterns to keep the promotion behavior-equivalent.
