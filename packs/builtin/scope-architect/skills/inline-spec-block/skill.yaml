# inline-spec-block — HARD gate. Blocks Write/Edit of a task/track spec into
# TASKS.md or docs/tasks/ if NO companion pre-research artifact exists on disk.
# Extracted from user-pack scope-decomposer rule `inline-spec-block` (DPC.1).
name: inline-spec-block
load: preload
when_to_load:
  - tool_match: Write
  - tool_match: Edit
triggers:
  - kind: tool_call
rules:
  - id: block-inline-spec-without-research
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      # Disk truth: does a companion pre-research artifact already exist?
      # Guarded so the readdir only runs for spec destinations.
      - call: path_exists
        if: '(tool == "Write" || tool == "Edit") && (endsWith(targs.file_path, "TASKS.md") || contains(targs.file_path, "docs/tasks/"))'
        args:
          dir: docs/research
          pattern: '*-pre-research-*.md'
          base_file: args.file_path
        as: research
      - call: text_pattern_match
        if: '(tool == "Write" || tool == "Edit") && (endsWith(targs.file_path, "TASKS.md") || contains(targs.file_path, "docs/tasks/"))'
        args:
          text_field: args.content
          patterns:
            - '###\s+(?:Task\s+[A-Z0-9.]+|#\d+)'
            - '\*\*(?:Deliverable|Required skills|Acceptance criteria|7-phase)\b'
        as: shapeWrite
      - call: text_pattern_match
        if: '(tool == "Write" || tool == "Edit") && (endsWith(targs.file_path, "TASKS.md") || contains(targs.file_path, "docs/tasks/"))'
        args:
          text_field: args.new_string
          patterns:
            - '###\s+(?:Task\s+[A-Z0-9.]+|#\d+)'
            - '\*\*(?:Deliverable|Required skills|Acceptance criteria|7-phase)\b'
        as: shapeEdit
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && (endsWith(targs.file_path, "TASKS.md") || contains(targs.file_path, "docs/tasks/")) && (len(shapeWrite.matched) > 0 || len(shapeEdit.matched) > 0) && research.exists == false'
        args:
          level: block
          message: >-
            BLOCKED: writing a task/track spec with NO pre-research artifact on
            disk. Author docs/research/<slug>-pre-research-<date>.md FIRST, then
            invoke the `task-spec-author` profession to produce the 11-field spec.
            Inline-spec in TASKS.md / docs/tasks/ is forbidden. To proceed:
            create the pre-research doc (the gate relaxes once it exists), or
            deactivate scope-architect for a one-off.
