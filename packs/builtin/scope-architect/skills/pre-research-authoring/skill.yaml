# pre-research-authoring — two soft warns guarding pre-research docs:
#   1. warn-preresearch-write-without-research (DPC.5): insufficient
#      research-tool activity this turn (did you DO the research?).
#   2. warn-scope-incomplete (SG.1, 2026-06-01): the doc doesn't answer the
#      three hole-finding questions — ## Alternatives / ## Failure modes /
#      ## Empirical spikes (does the doc ANSWER them?).
#
# SG.1 also FIXED rule 1's `text_field: 'targs.file_path'` → `'args.file_path'`:
# `targs.X` is a binding path, but text_pattern_match resolves text_field only
# against ctx.event fields — so rule 1 silently never fired. Both rules now use
# the event path `args.X` (the working convention, cf. inline-spec-block).
#
# Per T-DISCIPLINE-PIPELINE-COMPLETION DPC.5 (2026-05-30): closes the gap
# where the agent writes pre-research files from intuition instead of
# from actual research. Pre-research is the OUTPUT of doing research —
# not a planning doc authored from prior beliefs.
#
# Trigger: PreToolUse on Write/Edit targeting paths matching
# docs/research/[^/]*-pre-research-[^/]*\.md$ — the standard
# pre-research file naming convention enforced by inline-spec-block +
# scope-decomposer chain handoffs.
#
# Check: session_tool_history filtered to [mcp__opensquid__recall, Read,
# Grep]. Threshold 3 = heuristic for sufficient research (at least one
# recall + a couple of code reads/greps). Below threshold → warn.
#
# Verdict level: warn (soft surface). A legitimate session-2 continuation
# pre-research can have just 1 recall (resuming prior session's research);
# warn surfaces but allows write to proceed.
name: pre-research-authoring
load: preload
when_to_load:
  - tool_match: Write
  - tool_match: Edit
triggers:
  - kind: tool_call
rules:
  - id: warn-preresearch-write-without-research
    process:
      - call: tool_name
        as: tool
      # FIX (SG.1, 2026-06-01): was `targs.file_path` — a BINDING path that
      # text_pattern_match cannot resolve (it reads ctx.event fields only), so
      # this guard silently never matched and the warn never fired. The event
      # field is `args.file_path` (see inline-spec-block for the correct
      # convention). Now the rule actually fires.
      - call: text_pattern_match
        args:
          text_field: 'args.file_path'
          patterns:
            - 'docs/research/[^/]*-pre-research-[^/]*\.md$'
        as: is_preresearch
      - call: session_tool_history
        if: '(tool == "Write" || tool == "Edit") && len(is_preresearch.matched) > 0'
        args:
          scope: current_turn
          filter_names:
            - mcp__opensquid__recall
            - Read
            - Grep
        as: research
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && len(is_preresearch.matched) > 0 && research.count < 3'
        args:
          level: warn
          message: >-
            PRE-RESEARCH AUTHORING (DPC.5): about to write a pre-research
            doc with insufficient research-tool activity this turn (recall +
            Read + Grep combined < 3 calls).

            Pre-research is the OUTPUT of doing the research — not a planning
            doc you write from intuition. If you haven't done at least:
            (1) recall on the topic; (2) Read of relevant local files;
            (3) Grep of the codebase for prior art —
            you're authoring intuition, not research. The downstream
            task-spec-author then gets incomplete data → tasks built on
            drift.

            Required: recall + read + grep FIRST, THEN write the pre-research
            doc summarizing findings + residual gaps. Warn surfaces but does
            not block (a session-2 continuation pre-research may legitimately
            ride on session-1 research; pass through with awareness).
  # SG.1 (2026-06-01) — scope-completeness check. Complements the
  # research-activity warn above: that one asks "did you DO research?"; this
  # one asks "does the doc ANSWER the three hole-finding questions?"
  - id: warn-scope-incomplete
    process:
      - call: tool_name
        as: tool
      - call: text_pattern_match
        args:
          text_field: 'args.file_path'
          patterns:
            - 'docs/research/[^/]*-pre-research-[^/]*\.md$'
        as: is_preresearch
      # On a Write of a pre-research doc, the event carries the full doc in
      # args.content → scan it for the three section headers. Write-only: Edit
      # carries partial content (new_string), so the full-doc check is
      # unreliable there (block-at-authoring-advance follow-up covers Edit).
      - call: text_pattern_match
        if: 'tool == "Write" && len(is_preresearch.matched) > 0'
        args:
          text_field: 'args.content'
          patterns:
            - '##\s+Alternatives'
            - '##\s+Failure modes'
            - '##\s+Empirical spikes'
        as: sections
      - call: verdict
        if: 'tool == "Write" && len(is_preresearch.matched) > 0 && len(sections.matched) < 3'
        args:
          level: warn
          message: >-
            SCOPE COMPLETENESS (SG.1): this pre-research doc is missing one
            or more hole-finding sections. A complete scope answers all three
            BEFORE authoring tasks:
            ## Alternatives (>=2 options + why this one wins);
            ## Failure modes (inversion — each "how does this fail?" answered);
            ## Empirical spikes (each empirical open-question resolved by a
            cheap throwaway spike before locking the design).
            Holes found at scope are the cheapest you will ever fix — add the
            missing section(s), then re-write. (Warn, not block: the doc must
            stay authorable.)
prose: |
  Two soft gates on pre-research authoring:

  - warn-preresearch-write-without-research (DPC.5): threshold of 3
    research-tool calls is heuristic — biases toward "agent did some
    looking around" without being so strict that legitimate continuation
    pre-research gets noisily warned. (SG.1 fixed its silent-no-op
    text_field bug; it now actually fires.)
  - warn-scope-incomplete (SG.1): on a Write of a pre-research doc, checks
    args.content for the three hole-finding section headers (Alternatives /
    Failure modes / Empirical spikes). Warn, never block — the doc must
    stay authorable. Write-only: Edit carries partial content; a hard block
    that reads the full artifact from disk at the authoring-advance gate is
    a follow-up (needs a file-content-reading primitive). Header-presence
    only (v1) — section non-emptiness is a later refinement.

  Both fire only on the pre-research path convention; both are soft
  (warn) — they surface, never block. False-positive cost: an extra
  context injection. False-negative cost: no worse than baseline.
