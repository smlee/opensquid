# pack-scope-elicit — directive to scope-architect when the user mentions
# pack authoring AND the workflow hasn't started scope work yet.
#
# Per [[project_opensquid_no_agent_loop]] opensquid does NOT invoke
# scope-architect; it surfaces the directive on the next UserPromptSubmit
# envelope and the AGENT spawns the subagent.
#
# Reads the coding-flow pack's lifecycle state CROSS-PACK (read_fsm_state with
# `pack:`) — null/idle means no scope decomposition has happened yet.
name: pack-scope-elicit
load: preload
when_to_load:
  - kind: event_type
    type: prompt_submit
triggers:
  - kind: prompt_submit
rules:
  - id: detect-pack-authoring-intent-without-scope
    process:
      - call: text_pattern_match
        args:
          text_field: prompt
          patterns:
            - 'write\s+a\s+(?:new\s+)?pack'
            - 'author\s+a\s+(?:new\s+)?pack'
            - 'create\s+a\s+(?:new\s+)?(?:opensquid\s+)?pack'
            - 'build\s+a\s+(?:new\s+)?pack'
            - 'new\s+opensquid\s+pack'
        as: intent
      - call: read_fsm_state
        if: 'len(intent.matched) > 0'
        args:
          pack: coding-flow
        as: stage
      - call: verdict
        if: 'len(intent.matched) > 0 && (stage == null || stage == "idle")'
        args:
          level: directive
          next_action:
            profession: scope-architect
            rationale: >-
              pack-authoring intent detected without prior scope decomposition.
              Spawning scope-architect to produce a pre-research artifact before
              pack-architect walks the user through authoring.
