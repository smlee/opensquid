# coding-flow lifecycle — the general problem-solving behavior pattern as ONE total
# FSM. Three gated stages (each handed off to the next, each with a CONTENT gate):
#
#   SCOPE          scoping → researching → researched      gate: guess-audit (+ 3 sections)
#   TASK AUTHORING spec_authored → spec_complete → tasks_loaded   gate: spec-audit (11-field + real code)
#   CODE           phases_in_flight → phases_complete      gate: phase-log (7 phases before commit)
#
# "Coding" is the active gate profile, not the FSM's identity — this lifecycle is
# domain-general. The machine is total (a non-matching event is an explicit stay,
# validated by validateFsm). The unified SCOPE→AUTHOR→EXECUTE lifecycle.
# Spec: docs/tasks/T-fsm-unify.md (§1 union design, decisions D1–D7).
initial: idle
states:
  - idle
  - scoping
  - researching
  - researched
  - spec_authored
  - spec_complete
  - tasks_loaded
  - phases_in_flight
  - phases_complete
transitions:
  # ── SCOPE region ─────────────────────────────────────────────
  - { from: idle, on: scope_start, to: scoping }
  - { from: idle, on: research_done, to: researched } # robustness: pre-research write with no scope prompt
  - { from: scoping, on: research_done, to: researched }
  - { from: researching, on: research_done, to: researched }
  # researched --guess_found--> researching (the D3 loop-back) is now a `loopback_gate`
  # FLOW template in manifest.yaml (T-FC2); flows_compiler merges it in before validateFsm.
  # ── TASK AUTHORING region ────────────────────────────────────
  - { from: researched, on: spec_drafted, to: spec_authored } # a docs/tasks/T-*.md written (unverified)
  - { from: spec_authored, on: spec_verified, to: spec_complete } # spec-audit passed: 11 fields + real code (D7)
  - { from: spec_complete, on: tasks_loaded, to: tasks_loaded } # TaskCreate w/ provenance, only when AUTHOR-complete
  # ── CODE region ──────────────────────────────────────────────
  - { from: tasks_loaded, on: phase_started, to: phases_in_flight }
  - { from: phases_in_flight, on: phases_done, to: phases_complete }
  # ── Task-start reset (FU.11) ─────────────────────────────────
  # Activating a new UNSCOPED task resets the machine to scoping (from ANY state)
  # so the always-on scope gate re-arms per task — the FSM is session-level, so
  # without this a new task rides the prior task's phases_complete. step() supports
  # from: '*' (src/runtime/fsm.ts). Fired ONLY by the task-start guard, which gates
  # it strictly on TaskUpdate(in_progress) + has_generated_spec == false.
  - { from: '*', on: task_unscoped, to: scoping }
  # ── New-track re-arm (GF.7, F10) ─────────────────────────────
  # A run that reached phases_complete is DONE; a fresh scope-authoring prompt then
  # starts a NEW track. Without this, scope_start (valid only from idle) is a silent
  # no-op from the terminal state, so the SCOPE gate never re-engages for new work in
  # a live session. ONLY phases_complete re-arms — scope_start stays a no-op from
  # mid-run states (scoping/researching/spec_*/tasks_loaded/phases_in_flight), so a
  # stray scope keyword cannot reset an in-flight authoring run.
  - { from: phases_complete, on: scope_start, to: scoping }
