# execute-gate — the EXECUTE-region CONTENT gate (the symmetric third). SCOPE has
# guess-audit, AUTHOR has spec-audit; CODE/EXECUTE now has this: no `git commit` while
# the active task's 7-phase workflow is incomplete. Mode-independent port of
# sangmin-personal-rules/skills/workflow:34-70 — drops the `automation_mode_on`
# precondition (:31-32) that made it inert interactively, matching the
# mode-independent SCOPE/AUTHOR gates. Ad-hoc commits (no active task) PASS — the
# SCOPE gate already forces code work into the flow, so a tracked task is the in-flow
# case this guards. Spec: docs/tasks/T-fsm-unify.md §2.1; pre-research:
# docs/research/T-execute-gate-pre-research-2026-06-03.md.
name: execute-gate
load: preload
when_to_load: []
triggers:
  - kind: tool_call
rules:
  - id: phase-logged-before-commit
    process:
      - call: match_command
        args:
          # T-FLOW-UNSKIPPABLE FU.1 (the real root cause): this was `^git…commit`, anchored
          # at START — so a COMPOUND command `cd <dir> && git commit …` (how every commit is
          # actually made, since the Bash tool resets cwd) starts with `cd` and EVADED the
          # gate entirely. The gate was dead for real commits. Match `git … commit` ANYWHERE
          # (`\b`, like the sibling no-verify matcher) so compounds can't slip past. A false
          # match on a string that merely mentions `git commit` is the safe direction (recall
          # over precision, same as no-verify-block).
          pattern: '\bgit\s+(?:-[cC]\s+\S+\s+)*commit\b'
          target: tool_args.command
        as: committing
      # T-FLOW-UNSKIPPABLE FU.1 (D1): the gates must COMPOSE. The "no active task ⇒
      # ad-hoc ⇒ allow" branch below was a SEAM — a blocked TaskCreate (AUTHOR gate)
      # leaves NO active task, so its code leaked out as an "ad-hoc" commit. Close it:
      # a commit while the FSM is MID-FLOW (a track is open but NOT yet authored —
      # scoping/researching/researched/spec_authored) is NOT ad-hoc; it is
      # authoring-incomplete work and BLOCKS. A genuine ad-hoc commit is from idle /
      # phases_complete (no open track) — still allowed. (tasks_loaded / phases_in_flight
      # are PAST author — code is expected there, guarded by the phase check below.)
      - call: read_fsm_state
        if: 'committing'
        as: st
      - call: verdict
        if: 'committing && (st == "scoping" || st == "researching" || st == "researched" || st == "spec_authored")'
        args:
          level: block
          message: >-
            BLOCKED: a `git commit` while the flow is MID-FLOW (state: {{st}}) is NOT
            "ad-hoc" — it is authoring-incomplete work. Complete SCOPE→AUTHOR (pass the
            spec-audit + TaskCreate) before committing code. Do NOT route around a blocked
            TaskCreate via an ad-hoc commit — that seam is now closed.
      - call: has_active_task
        if: 'committing'
        as: active
      - call: workflow_phases_complete
        if: 'committing && active.present == true'
        as: phases
      - call: verdict
        if: 'committing && active.present == true && phases.complete == false'
        args:
          level: block
          message: >-
            BLOCKED: the 7-phase CODE flow is incomplete for the active task. Log each
            phase via `mcp__opensquid__log_phase` (pre_research → learn → code → test →
            audit → post_research → fix) before `git commit`. (Ad-hoc commits from idle /
            phases_complete pass; this gate guards in-flow work — the EXECUTE stage's
            content gate, symmetric with SCOPE's guess-audit + AUTHOR's spec-audit.)
prose: |
  The EXECUTE content gate — the third, making the three stages symmetric. A stage
  marker without a content gate is a checkbox (no-implicit-state); EXECUTE had only
  the FSM advance (phase-advance) and no blocking gate, so the 7-phase CODE flow was
  unenforced interactively. Blocks `git commit` until `workflow_phases_complete` is
  true for the active task.
