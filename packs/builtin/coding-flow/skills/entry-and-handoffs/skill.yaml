# entry-and-handoffs — the prompt_submit guards: enter the lifecycle on
# scope-authoring intent, and emit the stage→stage handoff directives (the
# connective tissue between the three peer stages): enter-scoping + the stage→stage
# handoffs. The handoff targets point at the unified state
# names (spec_complete, not spec_authored, for the AUTHOR→tasks handoff). FU.3 adds
# the track-type classification to `enter-scoping`.
name: entry-and-handoffs
load: preload
when_to_load: []
triggers:
  - kind: prompt_submit
rules:
  # Enter the lifecycle: a scope-authoring prompt advances idle → scoping.
  - id: enter-scoping
    process:
      - call: text_pattern_match
        args:
          text_field: prompt
          patterns:
            - '\bspec(?:c?ing|ced)?\b'
            - '\bscope\b'
            - '\bnew\s+(?:task|track)\b'
            - '\badd\s+(?:a\s+|another\s+)?(?:task|track)\b'
            - '\bdesign\b'
            - '\bplan\b'
        as: intent
      # RTC (wg-649d80e78e64): the request-type veto now lives in the arm_scope CHOKEPOINT — the
      # single owner shared by BOTH arm producers (this rule + rearm-on-depletion), so a research-
      # classified prompt (understand-only / a question — "what's the plan here?" matches \bplan\b but
      # is a question) can never arm scope and no producer can reintroduce the bypass. enter-scoping
      # just supplies its keyword-intent condition; arm_scope reads request-type and vetoes research.
      # (Supersedes the inline RTC.2 gate, wg-3d175ec06767.)
      - call: arm_scope
        if: 'len(intent.matched) > 0'
      # FU.3: record the track-type so the AUTHOR gate can consult it. RESET to the
      # strict default (feature) on every scope entry FIRST — so a stale fix/doc/
      # trivial value from a prior track can never under-gate a later feature task —
      # then downgrade on a keyword match (later writes win; fix/doc/trivial all skip
      # AUTHOR equally, so ambiguity among them is harmless). Unset/feature/stale =
      # feature = strictest (read_state(absent)→null, null != "fix" → gate fires).
      - call: write_state
        if: 'len(intent.matched) > 0'
        args:
          key: coding-flow-track
          value: feature
      # wg-4c48ef1b9969: clear the per-track scope state (pre-research/spec/design
      # pointers) as a UNIT so a shipped track's artifacts don't leak into the new
      # track (renderer re-fires the finished track; AUTHOR audit reads stale design).
      # Best-effort, ordered AFTER advance_fsm — never blocks the arm.
      - call: reset_scope_track_state
        if: 'len(intent.matched) > 0'
      # GF.5 (F5): a feature-intent probe. A downgrade to fix/doc/trivial applies ONLY
      # when NO feature-intent keyword is present — a mixed-intent prompt ("build X and
      # fix Y") stays `feature` (strictest), so one stray keyword can't disable the
      # AUTHOR gate for the whole session. The list is deliberately narrow (no
      # change/update/edit) so a pure fix/doc track still downgrades.
      - call: text_pattern_match
        args:
          text_field: prompt
          patterns:
            - '\b(?:build|add|feature|implement|refactor|new\s+(?:feature|module|endpoint))\b'
        as: featm
      - call: text_pattern_match
        args:
          text_field: prompt
          patterns:
            - '\b(?:fix|bug|patch|de-?flake|hotfix|regression|broken)\b'
        as: fixm
      - call: write_state
        if: 'len(intent.matched) > 0 && len(fixm.matched) > 0 && len(featm.matched) == 0'
        args:
          key: coding-flow-track
          value: fix
      - call: text_pattern_match
        args:
          text_field: prompt
          patterns:
            - '\b(?:doc|docs|documentation|readme|changelog|comment)\b'
        as: docm
      - call: write_state
        if: 'len(intent.matched) > 0 && len(docm.matched) > 0 && len(featm.matched) == 0'
        args:
          key: coding-flow-track
          value: doc
      - call: text_pattern_match
        args:
          text_field: prompt
          patterns:
            - '\b(?:trivial|typo|rename|whitespace|mechanical)\b'
        as: trivm
      - call: write_state
        if: 'len(intent.matched) > 0 && len(trivm.matched) > 0 && len(featm.matched) == 0'
        args:
          key: coding-flow-track
          value: trivial
  # TR.B (wg-2d1d8698f563) + GI.4 (wg-b7a87452152b): deliver the coding-flow gate instructions to the agent
  # BEFORE it authors — the fix for the blind-first-draft root cause. Placed AFTER enter-scoping so the cold
  # kickoff turn's just-armed `scoping` is visible (rules walk file-order; handoff-rescope-nudge below relies
  # on the same ordering). The injection is the `inject-phase` rule below (channel a, phase_inject).
  # RTC.5 (wg-3d175ec06767): when the deterministic classifier was UNCERTAIN (confidence:low), a fast
  # llm_classify decides research-vs-work and refines the persisted record (source:llm) — the "ACCURATE"
  # half of the lock. Gated strictly on confidence==low (the clear-cut majority never pays the llm cost).
  # Placed AFTER enter-scoping: the current turn's arm safely used the deterministic research-default
  # (backed by the git commit/push gate for a missed work turn); the refinement sharpens the record for
  # the downstream stop guards + measurement. UNCERTAIN/invalid llm output → record unchanged (stays safe).
  - id: refine-request-type
    process:
      - call: read_state
        args:
          key: request-type
        as: rt
      - call: current_prompt
        as: p
      - call: llm_classify
        if: 'rt.confidence == "low"'
        args:
          model: fast_classifier
          prompt: |
            Classify the user prompt as exactly one label:
            - research: a question, investigation, or understand-only request (no code change follows)
            - work: a request to build, change, or fix code
            Prompt: {{p}}
          allowed_labels: [research, work]
        as: refined
      - call: set_request_type
        if: 'rt.confidence == "low" && (refined == "research" || refined == "work")'
        args:
          type: '{{refined}}'
  # GI.4 (wg-b7a87452152b) — channel (a): deliver ONLY the CURRENT phase's bundle (procedure §N + the
  # phase rubric + the always-on §0 flow-picker + §On-a-BLOCK protocol), refreshed EVERY turn so it
  # survives compaction and orients before the first tool. phase_inject self-gates on the coding-flow FSM
  # state via selectPhaseBundle (idle/phases_complete→SCOPE — the lifted suppression) and writes
  # last-injected-phase-coding-flow so channel (b) (the PreToolUse mid-turn catch) can dedup. Inject-only;
  # never blocks. Replaces the former blob injectors (inject-rubric + inject-procedure).
  - id: inject-phase
    process:
      - call: phase_inject
  # GF.1 (F9) — the re-scope NUDGE, surfaced on prompt_submit (where directives are
  # delivered) for the `scoping` state. Fires after `enter-scoping` advanced idle→scoping
  # (or after task-start's task_unscoped reset, or GF.7's phases_complete re-arm landed
  # the FSM in scoping). Replaces the directive task-start tried to emit on tool_call
  # (dropped). Points the agent at the scope-architect persona to author the pre-research.
  - id: handoff-rescope-nudge
    process:
      - call: read_fsm_state
        as: st
      - call: verdict
        if: 'st == "scoping"'
        args:
          level: directive
          next_action:
            profession: scope-architect
            rationale: >-
              SCOPE armed (state: scoping). Author the pre-research artifact to
              teach-back depth (alternatives + failure modes + spikes), resolving every
              open question, BEFORE any code. METHOD: do your recall + Read + Grep
              (>=3 calls) in THIS turn, then write the pre-research ONCE — do not
              stub-then-edit across turns (the depth gate counts research per-turn).
              Hand off to the scope-architect persona.
  # SCOPE done → hand off to the task-spec-author persona.
  - id: handoff-research-to-spec
    process:
      - call: read_fsm_state
        as: st
      - call: read_state
        args:
          key: coding-flow-pre-research-path
        as: prp
      - call: verdict
        if: 'st == "researched"'
        args:
          level: directive
          next_action:
            profession: task-spec-author
            args:
              pre_research_path: '{{prp}}'
            rationale: >-
              SCOPE complete (state: researched). Hand off to the task-spec-author
              persona to consume the pre-research artifact and author the track
              spec — all 11 fields, real code. Do NOT hand-author the decomposition.
  # AUTHOR done (spec passed the audit) → hand off to task creation.
  - id: handoff-spec-to-tasks
    process:
      - call: read_fsm_state
        as: st
      - call: read_state
        args:
          key: coding-flow-spec-path
        as: sp
      - call: verdict
        if: 'st == "spec_complete"'
        args:
          level: directive
          next_action:
            tool: TaskCreate
            args:
              spec_path: '{{sp}}'
            rationale: >-
              TASK AUTHORING complete (state: spec_complete — the spec passed the
              11-field + real-code audit). TaskCreate each "### Task" block with
              metadata.taskId + metadata.spec = the spec's absolute path.
  # EXECUTE in flight but incomplete → resume phase logging.
  - id: handoff-resume-phases
    process:
      - call: read_fsm_state
        as: st
      - call: workflow_phases_complete
        as: phases
      - call: verdict
        if: 'st == "phases_in_flight" && phases.complete == false'
        args:
          level: directive
          next_action:
            tool: mcp__opensquid__log_phase
            rationale: >-
              CODE in flight (state: phases_in_flight) but the 7-phase workflow is
              incomplete for the active task. Resume at the next unlogged phase;
              log_phase as each completes.
  # AF.3 — the EXECUTE loop driver. A task's 7-layer is complete (phases_complete):
  # report it, then straight to the next task. (Directives only surface at prompt_submit,
  # so the loop driver lives here, not in phase-advance.)
  - id: handoff-task-complete
    process:
      - call: read_fsm_state
        as: st
      - call: workflow_phases_complete
        as: phases
      - call: verdict
        if: 'st == "phases_complete" && phases.complete == true'
        args:
          level: directive
          next_action:
            tool: mcp__opensquid-chat__chat_send
            args:
              channel: 'project:telegram'
            rationale: >-
              Task 7-layer COMPLETE (state: phases_complete). Send the plain-header per-task
              completion report to the main chat (topic 15), THEN immediately
              TaskUpdate(<next pending task>, in_progress) and continue — NO pause. Loop
              until the backlog is depleted.
  # G-a (T-FLOW-REARM-GATE-HOLES / RH.1) — the STRUCTURAL SCOPE re-arm. Closes the hole
  # where new work described in PLAIN LANGUAGE (no scope keyword) never re-armed the flow:
  # the FSM stayed parked at phases_complete, where run-active =
  # `FSM!=idle && (open>0 || FSM!=phases_complete)` reads FALSE, so the pause-gates
  # switched OFF and the agent could permission-fish un-gated (the 2026-06-04 leak). A
  # depleted terminal state (phases_complete + empty backlog) means the prior track is DONE,
  # so the NEXT prompt begins a new interaction → re-arm SCOPE on a STRUCTURAL fact (state +
  # backlog count), NOT a keyword guess. Two design points make this safe:
  #   • Placed LAST (after handoff-task-complete) so the completion-report directive fires
  #     FIRST on the post-completion prompt — the report is owed before re-arming (AF.3).
  #   • Gated on open.count == 0, so the backlog LOOP (open>0) is untouched —
  #     handoff-task-complete still drives report→next-task at phases_complete.
  # Scoped to phases_complete (NOT idle) for minimal blast radius. scope_start is a no-op
  # from every mid-run state (only idle/phases_complete have the transition — fsm.yaml), so
  # this can never reset an in-flight run. Landing in scoping is safe: it is the interactive
  # phase (Stop + AskUserQuestion allowed; scope-before-code only bites a real code Write).
  - id: rearm-on-depletion
    process:
      - call: read_fsm_state
        as: st
      - call: open_task_count
        as: open
      # RTC (wg-649d80e78e64): the SECOND arm producer routes through the SAME arm_scope chokepoint,
      # so a research/docs turn after a completed track can no longer spuriously re-arm scoping (the
      # gate-fighting class). arm_scope owns the research veto; this rule supplies only the structural
      # depletion condition.
      - call: arm_scope
        if: 'st == "phases_complete" && open.count == 0'
      # Strict default for the re-armed track: a plain-language track can't be classified,
      # so gate it at the strictest profile (feature). Mirrors enter-scoping's reset.
      - call: write_state
        if: 'st == "phases_complete" && open.count == 0'
        args:
          key: coding-flow-track
          value: feature
  # FU.2 (T-FLOW-UNSKIPPABLE / D2) — scope-sprawl escalation. The SCOPE phase is
  # otherwise ungated, so a sprawling, oscillating scope (many prompts, no converging
  # pre-research) is invisible. scope_dwell_tick increments a per-session counter while
  # the FSM is in scoping/researching (resets when it leaves), and at the threshold (3)
  # returns nudge=true → surface a "converge: write ONE pre-research" directive. SOFT
  # (surface, never block) — research legitimately takes multiple turns; this nudges
  # convergence, it does not forbid investigation.
  - id: scope-sprawl-nudge
    process:
      - call: scope_dwell_tick
        as: dwell
      - call: verdict
        if: 'dwell.nudge == true'
        args:
          level: directive
          message: >-
            CONVERGE THE SCOPE: you have spent several turns in the SCOPE phase without a
            converging pre-research artifact. Stop open-ended investigation now — write ONE
            `docs/research/T-*-pre-research-*.md` capturing the findings + the chosen design,
            and advance to AUTHOR. (Questions belong in scope, but the scope must CONVERGE,
            not sprawl.)
prose: |
  Entry + the four forward handoffs, one per stage boundary (incl. the EXECUTE→report→
  next-task loop driver, AF.3). State-driven via read_fsm_state — the directive at each
  milestone points the agent (and its persona) at the next stage's action.
