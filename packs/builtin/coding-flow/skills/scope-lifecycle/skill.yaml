# scope-lifecycle — the tool_call lifecycle: advances the unified FSM on milestone
# writes, runs each region's CONTENT audit immediately AFTER its advance (same skill,
# ordered — so the audit sees the just-advanced state), and
# enforces the region gates that read the state. Rule order is load-bearing:
#   advance-on-research → guess-audit → advance-on-spec → spec-audit → scope-before-code → taskcreate-spec-required
# Merges the SCOPE lifecycle + the AUTHOR/EXECUTE advance-on-writes, and folds
# in the two content audits (guess-audit, spec-audit). State-driven, never
# file-existence. Both audits run synchronously, are timeout-bounded (EWG.1.1), and
# fail CLOSED (no clear pass verdict ⇒ no advance).
name: scope-lifecycle
load: preload
when_to_load: []
triggers:
  - kind: tool_call
rules:
  # ── SCOPE: the GATING advance (AF.1). The content audit + depth + open-question
  #    checks run BEFORE the advance, and research_done is COUPLED to them — no
  #    advisory pass. The advance fires ONLY when SCOPE content is complete:
  #    GUESS_FREE (every claim cited-or-flagged + the BEST/simplest solution justified)
  #    AND zero unresolved OPEN QUESTION markers AND research depth >= 3 this turn.
  - id: scope-advance
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      # Capture the pre-research path (the AUTHOR coverage gate reads it as the design).
      - call: write_state
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")'
        args:
          key: coding-flow-pre-research-path
          value: '{{targs.file_path}}'
      # AF.2: persist the design CONTENT so the AUTHOR coverage audit can check the
      # task spec covers 100% of it (the subagent can't read files; state carries it).
      - call: write_state
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")'
        args:
          key: coding-flow-design
          value: '{{targs.content}}'
      # Research DEPTH (folded DPC.5): recall + Read + Grep this turn.
      - call: session_tool_history
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")'
        args:
          scope: current_turn
          filter_names: [mcp__opensquid__recall, Read, Grep]
        as: depth
      # The content audit: NEVER-GUESS + BEST-SOLUTION, one combined verdict.
      - call: subagent_call
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")'
        args:
          model: reasoning
          timeout_ms: 120000
          prompt: >-
            You are an adversarial reviewer enforcing TWO rules on a pre-research / scope
            artifact. (1) NEVER-GUESS: a claim is acceptable ONLY if DERIVED from cited
            evidence (a file:line, a memory, or the user's own words) OR explicitly flagged
            as an OPEN QUESTION to ask the user. (2) BEST-SOLUTION: the artifact must show
            the best solution was found — alternatives weighed against the criteria and the
            SIMPLEST correct one chosen per docs/lexicon.md (no proliferating special-cases).
            Begin your response with EXACTLY one line — `VERDICT: GUESS_FREE` ONLY if every
            claim is cited-or-flagged-open AND the simplest-correct solution is justified
            against alternatives; otherwise `VERDICT: UNRESOLVED` + one bullet per unresolved
            guess OR un-weighed alternative. ARTIFACT:\n\n{{targs.content}}
        as: audit
      # ADVANCE only when content-complete (coupled to the verdict + depth + no open Qs).
      - call: advance_fsm
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && contains(audit, "VERDICT: GUESS_FREE") && !contains(targs.content, "OPEN QUESTION") && depth.count >= 3'
        args:
          event: research_done
      # BLOCK: unresolved open questions — answer them in SCOPE (this is the interactive phase).
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && contains(targs.content, "OPEN QUESTION")'
        args:
          level: block
          message: >-
            SCOPE incomplete: the pre-research still has unresolved OPEN QUESTION(s).
            SCOPE is the interactive phase — ASK the user (AskUserQuestion), record + cite
            the answer, and remove the marker BEFORE authoring. Everything after scope is
            automated; a question must not survive into it.
      # BLOCK: shallow research (folded DPC.5 depth, now gating not warn).
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && depth.count < 3'
        args:
          level: block
          message: >-
            SCOPE shallow: do real research (recall + Read + Grep, >=3 this turn) before the
            pre-research write — map the decision surface to teach-back depth.
      # LOOP-BACK + WARN: guesses / no-best-solution. The advance above did NOT fire;
      # if already at researched (a re-write), loop back to researching.
      - call: advance_fsm
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && !contains(audit, "VERDICT: GUESS_FREE")'
        args:
          event: guess_found
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && !contains(audit, "VERDICT: GUESS_FREE")'
        args:
          level: warn
          message: >-
            SCOPE not complete — unresolved guesses OR the best/simplest solution is not
            justified against alternatives. Resolve each (cite evidence or flag as an open
            question; weigh the alternatives + choose the simplest correct per the lexicon),
            then re-write. Audit:\n\n{{audit}}
  # ── AUTHOR: advance on the track-spec write (+ capture its path) ─────────────
  - id: advance-on-spec
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      - call: advance_fsm
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md")'
        args:
          event: spec_drafted
      - call: write_state
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md")'
        args:
          key: coding-flow-spec-path
          value: '{{targs.file_path}}'
  # ── AUTHOR content gate: spec-audit (the restored twin of guess-audit) ───────
  - id: spec-audit
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      # AF.2: the SCOPE design content (persisted at the research write). The spec must
      # cover 100% of it — the audit compares spec-vs-design (no tool_call enumeration).
      - call: read_state
        args:
          key: coding-flow-design
        as: design
      - call: subagent_call
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md")'
        args:
          model: reasoning
          timeout_ms: 120000
          prompt: >-
            You are an adversarial reviewer enforcing THREE author-completeness rules.
            (1) 11-FIELD CONTRACT: EVERY "### Task" block has all 11 fields (Required
            skills, Deliverable, Depends on, Files affected, Key code shapes, Test
            fixtures, Acceptance criteria, Risk callouts, References, Verification
            commands, 7-phase steps), every Key-code-shapes block is REAL code (not
            pseudocode), every 7-phase step names concrete files/decisions. (2) 100%
            DESIGN COVERAGE: the task set covers EVERY element of the SCOPE design below —
            no design item is left without a task. (3) SIMPLICITY (per docs/lexicon.md):
            the design is the SIMPLEST correct solution — no proliferating special-cases
            (that signals a missed decomposition), every lifecycle an explicit
            total-transition FSM, every transform a pure function, no implicit state.
            Begin your response with EXACTLY one line — `VERDICT: SPEC_COMPLETE` ONLY if
            ALL THREE hold; otherwise `VERDICT: INCOMPLETE` + one bullet per offending
            block, uncovered design element, OR over-complected smell. Never say
            SPEC_COMPLETE if any task block falls short, any design element is uncovered,
            OR the design smells over-complected.
            DESIGN:\n\n{{design}}\n\nSPEC:\n\n{{targs.content}}
        as: spec_audit
      - call: advance_fsm
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md") && contains(spec_audit, "VERDICT: SPEC_COMPLETE")'
        args:
          event: spec_verified
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md") && !contains(spec_audit, "VERDICT: SPEC_COMPLETE")'
        args:
          level: warn
          message: >-
            Task spec incomplete — it stays at spec_authored (TaskCreate stays
            BLOCKED) until every task block carries all 11 fields with real code (no
            pseudocode). The AUTHOR content gate: finish task authoring before coding.
            Audit:\n\n{{spec_audit}}
  # ── SCOPE gate: block code while the SCOPE region is incomplete (D4) ─────────
  - id: scope-before-code
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      - call: read_fsm_state
        as: st
      # FU.12 — per-task: code requires a scoped active task. has_generated_spec is
      # false for BOTH "no active task" and "active task with no resolvable spec",
      # so this closes the door where code with no declared task rode the session FSM.
      - call: has_generated_spec
        if: '(tool == "Write" || tool == "Edit") && (contains(targs.file_path, "src/") || contains(targs.file_path, "packs/") || contains(targs.file_path, "test/"))'
        as: spec
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && (contains(targs.file_path, "src/") || contains(targs.file_path, "packs/") || contains(targs.file_path, "test/")) && (spec.generated == false || (st != "researched" && st != "spec_authored" && st != "spec_complete" && st != "tasks_loaded" && st != "phases_in_flight" && st != "phases_complete"))'
        args:
          level: block
          message: >-
            BLOCKED: scope before code. Either the SCOPE region is still pre-research,
            OR the active task is unscoped (no spec-audited spec on disk). Complete the
            pre-research artifact (docs/research/...-pre-research-...) AND activate a
            spec-audited task (TaskUpdate(<id>, in_progress)) before coding. Override
            only if the user explicitly scoped this work in THIS turn.
  # ── AUTHOR gate: no TaskCreate until the spec passed the audit (spec_complete) ─
  - id: taskcreate-spec-required
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      - call: read_fsm_state
        as: st
      # FU.3: the AUTHOR gate is profile-dependent. Read the track-type; a fix/doc/
      # trivial track skips task-authoring it doesn't need. read_state(absent)→null,
      # and null != "fix" is true (strict !==), so feature/unset/stale still FIRES —
      # strictest default. SCOPE (scope-before-code) + EXECUTE (commit) stay universal.
      - call: read_state
        args:
          key: coding-flow-track
        as: track
      - call: verdict
        if: '(tool == "TaskCreate") && track != "fix" && track != "doc" && track != "trivial" && st != "spec_complete" && st != "tasks_loaded" && st != "phases_in_flight" && st != "phases_complete"'
        args:
          level: block
          message: >-
            BLOCKED: task authoring incomplete. The task spec must pass the 11-field +
            real-code spec-audit (the AUTHOR content gate) before tasks are created —
            a thin or pseudocode spec is not enough. Finish the spec, then create tasks.
      - call: advance_fsm
        if: '(tool == "TaskCreate" || tool == "TaskUpdate") && len(targs.metadata.taskId) > 0'
        args:
          event: tasks_loaded
prose: |
  The full tool_call lifecycle in one ordered skill: each region's advance is
  immediately followed by its content audit (guess-audit after the research advance,
  spec-audit after the spec advance) so the audit sees the just-advanced state — the
  ordering the lifecycle relied on. Then the two region GATES (scope-before-code,
  taskcreate-spec-required) read the resulting state. "Coding" is the gate profile
  (src/∪packs/∪test/); the FSM is domain-general.
