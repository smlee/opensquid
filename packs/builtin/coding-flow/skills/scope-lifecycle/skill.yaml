# scope-lifecycle — the tool_call lifecycle: advances the unified FSM on milestone
# writes, runs each region's CONTENT audit immediately AFTER its advance (same skill,
# ordered — so the audit sees the just-advanced state), and
# enforces the region gates that read the state. Rule order is load-bearing:
#   advance-on-research → guess-audit → advance-on-spec → spec-audit → scope-before-code → taskcreate-spec-required
# Merges the SCOPE lifecycle + the AUTHOR/EXECUTE advance-on-writes, and folds
# in the two content audits (guess-audit, spec-audit). State-driven, never
# file-existence. Both audits run synchronously, are timeout-bounded (EWG.1.1), and
# fail CLOSED (no clear pass verdict ⇒ no advance).
name: scope-lifecycle
load: preload
when_to_load: []
triggers:
  - kind: tool_call
rules:
  # ── AUTONOMOUS re-arm (T-FLOW-AUTONOMOUS-REARM). A pre-research WRITE is the structural
  #    start of a new track's SCOPE. The other re-arms (entry-and-handoffs' enter-scoping /
  #    rearm-on-depletion, task-start's task_unscoped) fire on prompt_submit / an unscoped
  #    TaskUpdate — neither occurs BETWEEN slices in an autonomous run, so the FSM stayed
  #    parked at phases_complete and the agent had to hand-drive scope_start. Re-arm HERE on
  #    the tool_call. scope_start is a no-op from every mid-run state (fsm.yaml: edges only
  #    from idle/phases_complete), so this ONLY takes effect at the terminal/initial boundary;
  #    the track reset is state-gated so it can't clobber an in-flight fix/doc track. Placed
  #    FIRST so the re-arm lands (advance_fsm persists) before scope-advance fires research_done.
  - id: rearm-on-pre-research-write
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      - call: read_fsm_state
        as: st
      - call: advance_fsm
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && (st == "phases_complete" || st == "idle")'
        args:
          event: scope_start
      - call: write_state
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && (st == "phases_complete" || st == "idle")'
        args:
          key: coding-flow-track
          value: feature
  # ── SCOPE: the GATING advance (AF.1). The content audit + depth + open-question
  #    checks run BEFORE the advance, and research_done is COUPLED to them — no
  #    advisory pass. The advance fires ONLY when SCOPE content is complete:
  #    GUESS_FREE (every claim cited-or-flagged + the BEST/simplest solution justified)
  #    AND zero unresolved OPEN QUESTION markers AND research depth >= 3 this turn.
  - id: scope-advance
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      # T-FLOW-AUDIT-ARTIFACT: the EFFECTIVE post-write content (Write→content,
      # Edit→current file with old_string→new_string applied) so the audit +
      # design-capture see the REAL resulting artifact, not the Edit-empty
      # `targs.content` (which broke iterative refinement via Edit).
      - call: effective_content
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")'
        as: effective
      # Capture the pre-research path (the AUTHOR coverage gate reads it as the design).
      - call: write_state
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")'
        args:
          key: coding-flow-pre-research-path
          value: '{{targs.file_path}}'
      # AF.2: persist the design CONTENT so the AUTHOR coverage audit can check the
      # task spec covers 100% of it (the subagent can't read files; state carries it).
      - call: write_state
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")'
        args:
          key: coding-flow-design
          value: '{{effective}}'
      # Research DEPTH (folded DPC.5): recall + Read + Grep + read-only Bash this turn.
      - call: session_tool_history
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")'
        args:
          scope: current_turn
          filter_names: [mcp__opensquid__recall, Read, Grep, 'Bash:read-only']
        as: depth
      # The content audit: NEVER-GUESS + BEST-SOLUTION, one combined verdict.
      # on_error: continue — a spawn failure binds the err message to `audit`
      # and proceeds to the trichotomy below (the AUDIT-UNAVAILABLE branch),
      # instead of aborting the process and freezing the FSM (F0c).
      - call: subagent_call
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-")'
        on_error: continue
        args:
          model: reasoning
          timeout_ms: 170000
          prompt: >-
            You are an adversarial reviewer enforcing the lexicon's Research/Audit flow
            principles (docs/lexicon.md — never-guess, best-solution, full-fix-over-patch, teach-back depth) on a
            pre-research / scope artifact. (1) NEVER-GUESS: a claim is acceptable ONLY if DERIVED from cited
            evidence (a file:line, a memory, or the user's own words) OR explicitly flagged
            as an OPEN QUESTION to ask the user. (2) BEST-SOLUTION: the artifact must show
            the best solution was found — alternatives weighed against the criteria and the
            SIMPLEST correct one chosen per docs/lexicon.md (no proliferating special-cases).
            (3) FULL-FIX: the chosen solution must be the FULL fix — when the existing shape
            is the cause, it is re-architected, NOT a local patch that bolts on a special-case
            to dodge the rework (that patch is itself the proliferating-special-case
            overcomplication the Full-fix-over-patch guideline forbids).
            Begin your response with EXACTLY one line — `VERDICT: GUESS_FREE` ONLY if every
            claim is cited-or-flagged-open AND the simplest-correct solution is justified
            against alternatives AND is a full fix, not a patch around a design that should be
            re-architected; otherwise `VERDICT: UNRESOLVED` + one bullet per unresolved
            guess OR un-weighed alternative OR un-rearchitected patch. ARTIFACT:\n\n{{effective}}
        as: audit
      # ── PRECONDITIONS (evaluated FIRST, terminal blocks; key on the artifact,
      #    not the audit). They partition the precondition-FAILED subspace so the
      #    audit-string trichotomy below is a clean partition over its own subspace.
      # BLOCK: unresolved open questions — answer them in SCOPE (this is the interactive phase).
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && contains(effective, "OPEN QUESTION")'
        args:
          level: block
          message: >-
            SCOPE incomplete: the pre-research still has unresolved OPEN QUESTION(s).
            SCOPE is the interactive phase — ASK the user (AskUserQuestion), record + cite
            the answer, and remove the marker BEFORE authoring. Everything after scope is
            automated; a question must not survive into it.
      # BLOCK: shallow research (folded DPC.5 depth). Ordered after open-question; its
      # !OPEN QUESTION guard keeps the two preconditions mutually exclusive.
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && !contains(effective, "OPEN QUESTION") && depth.count < 3'
        args:
          level: block
          message: >-
            SCOPE shallow: do real research (recall + Read + Grep, >=3 this turn) before the
            pre-research write — map the decision surface to teach-back depth.
      # ── AUDIT-STRING TRICHOTOMY (reached ONLY when depth>=3 && no open question).
      #    {GUESS_FREE, UNRESOLVED, no-VERDICT} is a total partition of the audit string.
      # PASS → advance.
      - call: advance_fsm
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && depth.count >= 3 && !contains(effective, "OPEN QUESTION") && contains(audit, "VERDICT: GUESS_FREE")'
        args:
          event: research_done
      # CONTENT-FAIL → loop-back + warn (keyed POSITIVELY on UNRESOLVED, not !GUESS_FREE — so an
      # audit that could not run no longer masquerades as "guesses found").
      - call: advance_fsm
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && depth.count >= 3 && !contains(effective, "OPEN QUESTION") && contains(audit, "VERDICT: UNRESOLVED")'
        args:
          event: guess_found
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && depth.count >= 3 && !contains(effective, "OPEN QUESTION") && contains(audit, "VERDICT: UNRESOLVED")'
        args:
          level: warn
          message: >-
            SCOPE not complete — unresolved guesses OR the best/simplest solution is not
            justified against alternatives. Resolve each (cite evidence or flag as an open
            question; weigh the alternatives + choose the simplest correct per the lexicon),
            then re-write. Audit:\n\n{{audit}}
      # AUDIT-UNAVAILABLE → terminal BLOCK, NO advance (stays scoping, re-armable). F0c fix:
      # the audit subagent could not spawn (a no-VERDICT response, incl. the bound err message).
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/research/") && contains(targs.file_path, "-pre-research-") && depth.count >= 3 && !contains(effective, "OPEN QUESTION") && !contains(audit, "VERDICT:")'
        args:
          level: block
          message: >-
            SCOPE audit could not run (the reviewer subagent was unavailable — typically a
            per-session spawn cap after many cycles). This is NOT a content failure. Re-write the
            pre-research artifact to re-trigger the audit; if it persists, a FRESH session clears
            the spawn exhaustion. Do NOT --no-verify or gate-off. Audit error:\n\n{{audit}}
  # ── AUTHOR: advance on the track-spec write (+ capture its path) ─────────────
  - id: advance-on-spec
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      - call: advance_fsm
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md")'
        args:
          event: spec_drafted
      - call: write_state
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md")'
        args:
          key: coding-flow-spec-path
          value: '{{targs.file_path}}'
  # ── AUTHOR content gate: spec-audit (the restored twin of guess-audit) ───────
  - id: spec-audit
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      # AF.2: the SCOPE design content (persisted at the research write). The spec must
      # cover 100% of it — the audit compares spec-vs-design (no tool_call enumeration).
      - call: read_state
        args:
          key: coding-flow-design
        as: design
      # T-FLOW-AUDIT-ARTIFACT: effective post-write spec content (Edit-safe).
      - call: effective_content
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md")'
        as: effective
      # on_error: continue — F0c: a spawn failure binds the err to `spec_audit`
      # and proceeds to the trichotomy (AUDIT-UNAVAILABLE branch) instead of
      # aborting the process and freezing the FSM at spec_authored.
      - call: subagent_call
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md")'
        on_error: continue
        args:
          model: reasoning
          timeout_ms: 170000
          prompt: >-
            You are an adversarial reviewer enforcing THREE author-completeness rules.
            (1) 11-FIELD CONTRACT: EVERY "### Task" block has all 11 fields (Required
            skills, Deliverable, Depends on, Files affected, Key code shapes, Test
            fixtures, Acceptance criteria, Risk callouts, References, Verification
            commands, 7-phase steps), every Key-code-shapes block is REAL code (not
            pseudocode), every 7-phase step names concrete files/decisions. (2) 100%
            DESIGN COVERAGE: the task set covers EVERY element of the SCOPE design below —
            no design item is left without a task. (3) SIMPLICITY (per docs/lexicon.md):
            the design is the SIMPLEST correct solution — no proliferating special-cases
            (that signals a missed decomposition), every lifecycle an explicit
            total-transition FSM, every transform a pure function, no implicit state.
            Begin your response with EXACTLY one line — `VERDICT: SPEC_COMPLETE` ONLY if
            ALL THREE hold; otherwise `VERDICT: INCOMPLETE` + one bullet per offending
            block, uncovered design element, OR over-complected smell. Never say
            SPEC_COMPLETE if any task block falls short, any design element is uncovered,
            OR the design smells over-complected.
            DESIGN:\n\n{{design}}\n\nSPEC:\n\n{{effective}}
        as: spec_audit
      # ── spec-audit trichotomy (clean partition over the audit string; no depth/
      #    open-question preconditions — those are SCOPE-only).
      # PASS → advance.
      - call: advance_fsm
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md") && contains(spec_audit, "VERDICT: SPEC_COMPLETE")'
        args:
          event: spec_verified
      # CONTENT-FAIL → warn (keyed POSITIVELY on INCOMPLETE, not !SPEC_COMPLETE — so an audit
      # that could not run no longer masquerades as an incomplete spec).
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md") && contains(spec_audit, "VERDICT: INCOMPLETE")'
        args:
          level: warn
          message: >-
            Task spec incomplete — it stays at spec_authored (TaskCreate stays
            BLOCKED) until every task block carries all 11 fields with real code (no
            pseudocode). The AUTHOR content gate: finish task authoring before coding.
            Audit:\n\n{{spec_audit}}
      # AUDIT-UNAVAILABLE → BLOCK, no advance (stays spec_authored, re-armable). F0c fix.
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && contains(targs.file_path, "docs/tasks/T-") && endsWith(targs.file_path, ".md") && !contains(spec_audit, "VERDICT:")'
        args:
          level: block
          message: >-
            AUTHOR audit could not run (the reviewer subagent was unavailable — typically a
            per-session spawn cap). This is NOT a content failure. Re-write the spec to re-trigger
            the audit; if it persists, a FRESH session clears the spawn exhaustion. Do NOT
            --no-verify or gate-off. Audit error:\n\n{{spec_audit}}
  # ── SCOPE nudge: code-before-scope is a best-effort WARN (GF.3) ──────────────
  # GF.3 (F4): demoted from a hard block to a best-effort NUDGE. The completeness
  # burden moved to the OWNED BOUNDARY: GF.2's git pre-commit/pre-push hooks read the
  # REAL staged diff and FAIL CLOSED — that is the guarantee. This in-session check is
  # just fast early feedback before a Write/Edit; its path predicate (the src/∪packs/∪
  # test/ substrings) stays best-effort by design (it does NOT need git-tracked-ness
  # precision — GF.2 catches what it misses, incl. Bash-mediated writes [F3, an accepted
  # limitation here: Bash writes are caught at the commit boundary, not by this nudge]).
  - id: scope-before-code
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      - call: read_fsm_state
        as: st
      - call: has_generated_spec
        if: '(tool == "Write" || tool == "Edit") && (contains(targs.file_path, "src/") || contains(targs.file_path, "packs/") || contains(targs.file_path, "test/"))'
        as: spec
      # Same condition as before (incl. the GF.4 F7 spec_complete allow set), but WARN.
      - call: verdict
        if: '(tool == "Write" || tool == "Edit") && (contains(targs.file_path, "src/") || contains(targs.file_path, "packs/") || contains(targs.file_path, "test/")) && (spec.generated == false || (st != "spec_complete" && st != "tasks_loaded" && st != "phases_in_flight" && st != "phases_complete"))'
        args:
          level: warn
          message: >-
            NUDGE: scope before code. The SCOPE region looks incomplete (still pre-research,
            or the active task has no spec-audited spec). Complete the pre-research artifact
            AND activate a spec-audited task before coding. (This is a best-effort early
            warning — the hard guarantee is the git pre-commit/pre-push gate, which blocks a
            code commit/push that has not completed the flow.)
  # ── verify-skip detector: the ONE closed opt-out token (GF.3) ────────────────
  # The git gate (GF.2) is bypassable only by passing the verify-skipping flag to `git
  # commit/push` (or `git commit -n`) — a single explicit opt-out (not a denylist over an
  # open set), so it is a hard BLOCK. `git push -n` is --dry-run, NOT a verify-skip, so -n
  # is matched for `commit` only. KNOWN LIMITATION (matching a shell string is imperfect):
  # the flag literal appearing inside a `-m "…"` commit MESSAGE also matches → over-block.
  # That direction is INTENTIONAL and safe for a bypass-detector: a false positive (an
  # annoying block on a message that mentions the flag) beats a false negative (letting a
  # real bypass through). Do NOT "fix" this by anchoring to flag position — that
  # reintroduces a false negative on `git commit -m msg <flag>`.
  - id: no-verify-block
    process:
      - call: tool_name
        as: tool
      - call: match_command
        args:
          pattern: '(?:\bgit\s+commit\b.*(?:--no-verify|\s-n\b))|(?:\bgit\s+push\b.*--no-verify)'
          target: tool_args.command
        as: skipping
      - call: verdict
        if: '(tool == "Bash") && skipping'
        args:
          level: block
          message: >-
            BLOCKED: --no-verify bypasses the opensquid git gate (pre-commit/pre-push). Do
            not skip the flow gate. Complete the SCOPE→AUTHOR→7-phase flow, then commit/push
            normally. Use --no-verify only with explicit user authorization.
  # ── AUTHOR gate: no TaskCreate until the spec passed the audit (spec_complete) ─
  - id: taskcreate-spec-required
    process:
      - call: tool_name
        as: tool
      - call: tool_args
        as: targs
      - call: read_fsm_state
        as: st
      # FU.3: the AUTHOR gate is profile-dependent. Read the track-type; a fix/doc/
      # trivial track skips task-authoring it doesn't need. read_state(absent)→null,
      # and null != "fix" is true (strict !==), so feature/unset/stale still FIRES —
      # strictest default. SCOPE (scope-before-code) + EXECUTE (commit) stay universal.
      - call: read_state
        args:
          key: coding-flow-track
        as: track
      - call: verdict
        if: '(tool == "TaskCreate") && track != "fix" && track != "doc" && track != "trivial" && st != "spec_complete" && st != "tasks_loaded" && st != "phases_in_flight" && st != "phases_complete"'
        args:
          level: block
          message: >-
            BLOCKED: task authoring incomplete. The task spec must pass the 11-field +
            real-code spec-audit (the AUTHOR content gate) before tasks are created —
            a thin or pseudocode spec is not enough. Finish the spec, then create tasks.
      - call: advance_fsm
        if: '(tool == "TaskCreate" || tool == "TaskUpdate") && len(targs.metadata.taskId) > 0'
        args:
          event: tasks_loaded
prose: |
  The full tool_call lifecycle in one ordered skill: each region's advance is
  immediately followed by its content audit (guess-audit after the research advance,
  spec-audit after the spec advance) so the audit sees the just-advanced state — the
  ordering the lifecycle relied on. Then the two region GATES (scope-before-code,
  taskcreate-spec-required) read the resulting state. "Coding" is the gate profile
  (src/∪packs/∪test/); the FSM is domain-general.
