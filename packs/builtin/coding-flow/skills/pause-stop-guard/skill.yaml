# pause-stop-guard (AF.6) — the Stop-region pause-gate. Stopping DURING a run's AUTHOR or
# EXECUTE region (FSM past `researched`, before idle/phases_complete) is drift: the
# automated phases take no pauses until the backlog is depleted. A SCOPE stop (to await a
# genuine user answer) is fine and is NOT flagged here (FSM in idle/scoping/researching/
# researched). Own trigger so the FSM-only condition can't cross-fire on tool/prompt events.
name: pause-stop-guard
load: preload
when_to_load: []
triggers:
  - kind: stop
rules:
  - id: no-stop-mid-run
    process:
      - call: read_fsm_state
        as: st
      - call: open_task_count
        as: open
      # GF.6 (F8): HARD-BLOCK the stop, and WIDEN coverage — also fire at `researched`
      # (SCOPE done, AUTHOR owed) and at `phases_complete` WHILE the backlog is non-empty
      # (open tasks remain). The depletion auto-OFF is preserved: `idle` and
      # `phases_complete` with ZERO open tasks are NOT flagged, so a finished run stops
      # freely. (open_task_count on the `stop` event has no event.openTasks → it reads the
      # harness store, returning the real count.)
      - call: verdict
        if: 'st == "researched" || st == "spec_authored" || st == "spec_complete" || st == "tasks_loaded" || st == "phases_in_flight" || (st == "phases_complete" && open.count > 0)'
        args:
          level: block
          message: >-
            DRIFT: you stopped mid-run (AUTHOR/EXECUTE, or with the backlog non-empty). The
            run is NOT complete — everything after SCOPE is automated. Do not pause: continue
            to the next phase/task and keep going until the whole backlog is depleted. (A
            SCOPE stop to await a genuine user answer is the only allowed pause, and you are
            past SCOPE.)
  # SDG.1 (wg-66307bc8af35) — the SCOPE-stop exception was unconditional, so a
  # decision-DEFERRAL pause ("your call", "say the word") slipped through at
  # scoping between slices. The precise allow-signal: a SCOPE stop is
  # legitimate iff a fork is ACTUALLY awaiting the user — AskUserQuestion ran
  # this turn (the tool ledger is written at PreToolUse, immune to the stop
  # text's off-by-one that killed the text-match design; see the
  # pre-research). A prose question gets blocked once and re-posed through
  # the tool — the structured-fork upgrade is intended.
  - id: scope-stop-needs-a-question
    process:
      - call: read_fsm_state
        as: st
      - call: session_tool_history
        args:
          scope: current_turn
          filter_names: [AskUserQuestion]
        as: asked
      # RTC.3 (wg-3d175ec06767): a research-classified turn (understand-only / a question) never
      # armed the flow and owes no structured fork — its stop is legitimate on ANY harness. Reading
      # the harness-NEUTRAL request-type record (not the Claude-only AskUserQuestion-ran signal) is
      # the portable allow-signal that fixes cause-2 of the codex-pause-wedge (codex has no
      # AskUserQuestion). Null-safe: absent record → rt.type undefined → `rt.type != "research"` true
      # → preserves today's block (AskUserQuestion stays an additional allow-signal via asked.count).
      - call: read_state
        args:
          key: request-type
        as: rt
      - call: verdict
        if: '(st == "scoping" || st == "researching") && asked.count == 0 && rt.type != "research"'
        args:
          level: block
          message: >-
            DRIFT: a SCOPE stop without a pending question. A stop during SCOPE
            is for awaiting a genuine user answer — pose the fork via
            AskUserQuestion (state the options, ask it), or continue the
            research. A deferral ("your call", "say the word") is not a pause
            ticket.
prose: |
  Stopping during AUTHOR or EXECUTE — or at phases_complete with open tasks remaining — is
  drift, and is now HARD-BLOCKED (GF.6). The only legitimate pause is a genuine
  user-question during the interactive SCOPE phase — and SDG.1 makes that literal: a stop at
  scoping/researching is allowed only when AskUserQuestion ran this turn (a fork is actually
  awaiting the user); a deferral is not a pause ticket. Everything downstream runs to
  depletion. A depleted run (idle, or phases_complete with zero open tasks) stops freely.
