# pause-stop-guard (AF.6) — the Stop-region pause-gate. Stopping DURING a run's AUTHOR or
# EXECUTE region (FSM past `researched`, before idle/phases_complete) is drift: the
# automated phases take no pauses until the backlog is depleted. A SCOPE stop (to await a
# genuine user answer) is fine and is NOT flagged here (FSM in idle/scoping/researching/
# researched). Own trigger so the FSM-only condition can't cross-fire on tool/prompt events.
name: pause-stop-guard
load: preload
when_to_load: []
triggers:
  - kind: stop
rules:
  - id: no-stop-mid-run
    process:
      - call: read_fsm_state
        as: st
      - call: open_task_count
        as: open
      # The automation signal (env-only) — this HARD-BLOCK is INERT outside the driven loop, mirroring
      # v2 fullstack-flow's stop-guard (packs/builtin/fullstack-flow/skills/stop-guard). Interactively
      # (OPENSQUID_AUTOMATION unset) a mid-work Stop to await a genuine user answer must never be walled;
      # the block engages only inside the driven loop.
      - call: is_automation_mode
        as: automation
      # GF.6 (F8): HARD-BLOCK the stop PAST SCOPE only. The whole scope region
      # (scoping/researching/researched) is FREE — no in-scope pause guard (user 2026-06-25:
      # "reject all pauses post scoping; no guard needed in scope"). Depletion auto-OFF preserved:
      # `idle` and `phases_complete` with ZERO open tasks are NOT flagged. On the pause, inject the
      # phase bundle (procedure + rubric) via `phase_bundle_text` — GATED by the same condition so
      # the I/O only runs when the pause actually fires.
      - call: phase_bundle_text
        if: 'automation.value == true && (st == "spec_authored" || st == "spec_complete" || st == "tasks_loaded" || st == "phases_in_flight" || (st == "phases_complete" && open.count > 0))'
        as: bundle
      - call: verdict
        if: 'automation.value == true && (st == "spec_authored" || st == "spec_complete" || st == "tasks_loaded" || st == "phases_in_flight" || (st == "phases_complete" && open.count > 0))'
        args:
          level: block
          message: >-
            DRIFT: you stopped mid-run (AUTHOR/EXECUTE, or with the backlog non-empty). The
            run is NOT complete — everything after SCOPE is automated. Do not pause: continue
            to the next phase/task and keep going until the whole backlog is depleted. (A
            SCOPE stop to await a genuine user answer is the only allowed pause, and you are
            past SCOPE.)


            {{bundle.text}}
prose: |
  Scope is FREE — no in-scope pause guard (pauses/questions are fine during the interactive SCOPE
  phase: scoping/researching/researched). PAST SCOPE every stop is HARD-BLOCKED (GF.6) until the
  backlog is depleted — do not pause, continue to the next phase/task. A depleted run (idle, or
  phases_complete with zero open tasks) stops freely. The block is AUTOMATION-GATED
  (`is_automation_mode`, env-only, mirrors v2 fullstack-flow's stop-guard): interactively it is a true
  no-op so a mid-work Stop is never walled; it engages only inside the driven loop. On any post-scope
  pause the phase bundle (procedure + rubric) is injected so the agent resumes with the full context.
