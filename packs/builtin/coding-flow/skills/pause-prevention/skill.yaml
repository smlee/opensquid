# pause-prevention (AF.6) — the tool_call + prompt_submit pause-gates. Two rules, each
# naturally event-gated (the AskUserQuestion rule no-ops without a tool; the language rule
# no-ops without priorAssistantText), so one skill on both triggers is safe. Both fire ONLY PAST
# SCOPE — neither touches the FREE scope region (scoping/researching/researched). Post-scope is
# derived: FSM not in {idle,scoping,researching,researched} AND (open tasks remain OR not
# phases_complete). Off when the backlog is depleted (user ruling 2026-06-25: scope free).
name: pause-prevention
load: preload
when_to_load: []
triggers:
  - kind: tool_call
  - kind: prompt_submit
rules:
  # AskUserQuestion past SCOPE → drift. Questions belong to the interactive SCOPE phase
  # (idle/scoping/researching/researched); past it the run is automated.
  - id: no-question-after-scope
    process:
      - call: tool_name
        as: tool
      - call: read_fsm_state
        as: st
      # GF.6 (F8): HARD-BLOCK the question — it's a real-time pause ACTION, so exit-2 deny
      # actually prevents it (the agent must answer from the principles, not stall).
      # CFD.3/PG.4: inject the phase bundle (procedure + rubric) on this hard-blocked pause,
      # GATED by the same condition so the I/O only runs when the block fires.
      - call: phase_bundle_text
        if: '(tool == "AskUserQuestion") && st != "idle" && st != "scoping" && st != "researching" && st != "researched"'
        as: bundle
      - call: verdict
        if: '(tool == "AskUserQuestion") && st != "idle" && st != "scoping" && st != "researching" && st != "researched"'
        args:
          level: block
          message: >-
            DRIFT: AskUserQuestion past SCOPE. Questions belong to the interactive SCOPE
            phase — fill every gap there. Past scope the run is automated; do not pause for a
            question that should have been asked during scoping (if a real gap surfaced, the
            SCOPE was incomplete — re-scope it, do not stall the run).


            {{bundle.text}}
  # Pause / permission LANGUAGE in the just-settled prior turn during an active run → drift.
  # text_pattern_match on priorAssistantText (like honesty-ledger), gated on run-active.
  # GF.6: stays WARN (not block) — it's a RETROSPECTIVE detector of an already-emitted
  # pause, not the pause action itself; blocking the next (possibly unrelated) tool would
  # not undo the pause and risks locking the session. The real-time action gates
  # (no-stop-mid-run, no-question-after-scope) are the hard blocks.
  - id: no-pause-language
    process:
      - call: text_pattern_match
        args:
          text_field: priorAssistantText
          patterns:
            - "\\b(?:should\\s+i\\s+(?:continue|proceed)|want\\s+me\\s+to|ready\\s+to\\s+(?:continue|proceed)|shall\\s+i|is\\s+(?:this|the\\s+plan)\\s+(?:ok|good|right))\\b"
            - "\\b(?:i'?ll\\s+pause|let\\s+me\\s+(?:check|pause|confirm)\\s+(?:with\\s+you|before)|pausing\\s+(?:here|now)|checkpoint\\s+here)\\b"
            - '\b(?:context\s+(?:window\s+)?limit|at\s+(?:the\s+)?(?:practical\s+)?limit|running\s+(?:low|out)\s+of\s+context)\b'
            # G-b (T-FLOW-REARM-GATE-HOLES / RH.2): the decision-DEFERRAL class — handing the
            # proceed/choice decision back to the user ("your call", "unless you redirect",
            # "let me know which", "none of these"). The 2026-06-04-flagged leak. ONE coherent
            # class, not ad-hoc phrases. This stays a retrospective best-effort WARN — the HARD
            # guarantee is the Stop/Question blocks (re-armed by RH.1's structural re-arm). A
            # false positive is a harmless non-blocking nudge, so recall is favoured over
            # precision (same asymmetry as the no-verify over-block).
            - "\\b(?:your\\s+call|up\\s+to\\s+you|your\\s+(?:decision|choice)|unless\\s+you(?:'?d|\\s+would)?\\s+(?:rather|prefer|redirect|want|like)|if\\s+you'?d\\s+(?:rather|prefer|like)|whichever\\s+you\\s+(?:prefer|want|'?d\\s+like)|let\\s+me\\s+know\\s+(?:if|which|whether|what)|say\\s+the\\s+word|would\\s+you\\s+like\\s+me\\s+to|do\\s+you\\s+want\\s+me\\s+to|which\\s+(?:one|of\\s+these)|(?:any|none)\\s+of\\s+these)\\b"
        as: paused
      - call: read_fsm_state
        as: st
      - call: open_task_count
        as: open
      # CFD.3/PG.4: inject the phase bundle on this warn too (user's "any type of pause"),
      # GATED by the same condition so the I/O only runs when the warn fires.
      - call: phase_bundle_text
        if: 'len(paused.matched) > 0 && st != "idle" && st != "scoping" && st != "researching" && st != "researched" && (open.count > 0 || st != "phases_complete")'
        as: bundle
      - call: verdict
        if: 'len(paused.matched) > 0 && st != "idle" && st != "scoping" && st != "researching" && st != "researched" && (open.count > 0 || st != "phases_complete")'
        args:
          level: warn
          message: >-
            DRIFT: pause/permission language during an active run. Scope is complete — the run
            is automated until the backlog is depleted. No "should I continue / is this ok /
            at a context limit / let me pause": continue straight to the next task. The only
            valid interrupt is a genuine user-question during SCOPE — and you are past it.


            {{bundle.text}}
prose: |
  Two POST-SCOPE pause-gates (scope is FREE; both fire only past the scope region): an
  AskUserQuestion past SCOPE (GF.6: HARD-BLOCK — the real-time pause action), and pause/permission
  LANGUAGE in the settled prior turn (priorAssistantText, WARN — a retrospective detector, now
  post-scope only). The automated phases take no pauses; pauses/questions live in SCOPE.
